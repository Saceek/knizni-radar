name: Refresh knihovny
on:
  schedule:
    - cron: '0 4 * * *'     # denně 04:00 UTC (~5–6 ráno v ČR; cron je vždy v UTC)
  workflow_dispatch: {}      # přidá tlačítko "Run workflow" pro ruční spuštění
permissions:
  contents: write            # aby mohl commitnout výsledný JSON
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci || npm i

      - name: Knihy → books.json
        run: node build.js
        env:
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_KEY }}   # nepovinné; secret klidně zůstává GOOGLE_BOOKS_KEY

      - name: Steam → games.json
        run: node build-games.js
        continue-on-error: true       # když Steam zlobí, ať to nezhodí aktualizaci knih

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: ČSFD → movies.json
        run: node build-movies.js
        continue-on-error: true       # když ČSFD zlobí, ať to nezhodí zbytek

      - name: ČSFD + Steam → coming.json
        run: node build-coming.js
        continue-on-error: true

      - name: Novinky → news.json
        run: node build-news.js

      - name: Commit dat
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add books.json games.json movies.json coming.json news.json previous-books.json previous-games.json previous-movies.json
          git diff --staged --quiet || git commit -m "data: refresh [skip ci]"
          git push
