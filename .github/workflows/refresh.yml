name: Refresh knihovny
on:
  schedule:
    - cron: '13 3 * * *'    # denně ~3:13 UTC (~4–5 ráno v ČR). Mimo celou hodinu záměrně –
                            # GitHub cronu na "0 4 * * *" pravidelně přidával 3-4h zpoždění
                            # (fronta plánovaných úloh je nejvytíženější přesně na hodinu)
  workflow_dispatch: {}      # přidá tlačítko "Run workflow" pro ruční spuštění
permissions:
  contents: write            # aby mohl commitnout výsledný JSON
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci || npm i

      - name: Knihy → books.json
        run: node build.js
        env:
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_KEY }}   # nepovinné; secret klidně zůstává GOOGLE_BOOKS_KEY

      - name: CREW komiksy → crew.json
        run: node build-crew.js
        continue-on-error: true       # když CREW/databazeknih zlobí, ať to nezhodí zbytek

      - name: PC Game Pass katalog → gamepass.json
        run: node build-gamepass.js
        continue-on-error: true       # když MS API zlobí, hry se prostě zobrazí bez Game Pass tagu

      - name: Steam → games.json
        run: node build-games.js
        continue-on-error: true       # když Steam zlobí, ať to nezhodí aktualizaci knih

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: ČSFD → movies.json
        run: node build-movies.js
        continue-on-error: true       # když ČSFD zlobí, ať to nezhodí zbytek

      - name: ČSFD + Steam → coming.json
        run: node build-coming.js
        continue-on-error: true

      - name: Enrichment backlogu (hodnocení + ceny)
        run: node build-enrich-backlog.js
        continue-on-error: true

      - name: Novinky → news.json
        run: node build-news.js

      - name: Commit dat
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add books.json crew.json gamepass.json games.json movies.json coming.json news.json news-history.json previous-books.json previous-crew.json previous-games.json previous-movies.json previous-gamepass.json backlog.json
          git diff --staged --quiet || git commit -m "data: refresh [skip ci]"
          git push
