<style>
  :root{
    --bg:#080b16; --text:#e9edfb; --sub:#8a96b8;
    --card:rgba(255,255,255,.04); --cb:rgba(150,170,255,.13);
    --chip:rgba(255,255,255,.05); --chipt:#c2cbe6; --chipon:#fff; --chipont:#0f172a; --input:rgba(255,255,255,.045);
    --emerald:#4ade80; --amber:#fbbf24; --rose:#fb4d7d; --cyan:#37e3d4; --violet:#8b7dff;
    --glow:rgba(139,125,255,.16); --glow2:rgba(55,227,212,.10); --grid:rgba(140,160,255,.05);
    --orb1:rgba(139,125,255,.18); --orb2:rgba(55,227,212,.14);
    --disp:"Space Grotesk",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  .light{
    --bg:#eef1fa; --text:#141a2b; --sub:#5d6b8c;
    --card:rgba(255,255,255,.78); --cb:#d6dcf0;
    --chip:#ffffff; --chipt:#3b4258; --chipon:#141a2b; --chipont:#fff; --input:#ffffff;
    --emerald:#16a34a; --amber:#d9810a; --rose:#e11d63; --cyan:#0b8aa0; --violet:#6d5ef0;
    --glow:rgba(109,94,240,.10); --glow2:rgba(11,138,160,.06); --grid:rgba(40,60,120,.05);
    --orb1:rgba(109,94,240,.12); --orb2:rgba(11,138,160,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;min-height:100vh;
    background:var(--bg);background-attachment:fixed}
  @keyframes gridScroll{0%{background-position:0 0}100%{background-position:0 46px}}
  @keyframes orbPulse1{0%,100%{opacity:.13;transform:translate(-50%,-50%) scale(1)}50%{opacity:.22;transform:translate(-50%,-50%) scale(1.15)}}
  @keyframes orbPulse2{0%,100%{opacity:.10;transform:translate(-50%,-50%) scale(1.1)}50%{opacity:.18;transform:translate(-50%,-50%) scale(.9)}}
  @keyframes orbDrift1{0%{top:-5%;left:75%}25%{top:10%;left:80%}50%{top:5%;left:70%}75%{top:-2%;left:78%}100%{top:-5%;left:75%}}
  @keyframes orbDrift2{0%{top:8%;left:-2%}25%{top:2%;left:5%}50%{top:12%;left:-5%}75%{top:5%;left:2%}100%{top:8%;left:-2%}}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:46px 46px;
    animation:gridScroll 8s linear infinite;
    -webkit-mask:linear-gradient(#000 60%,transparent);mask:linear-gradient(#000 60%,transparent)}
  body::after{content:"";position:fixed;pointer-events:none;z-index:0;
    width:500px;height:500px;border-radius:50%;
    top:-5%;left:75%;
    background:var(--orb1,rgba(139,125,255,.18));filter:blur(80px);
    animation:orbPulse1 5s ease-in-out infinite, orbDrift1 20s ease-in-out infinite}
  .orb2{position:fixed;pointer-events:none;z-index:0;
    width:420px;height:420px;border-radius:50%;
    top:8%;left:-2%;
    background:var(--orb2,rgba(55,227,212,.14));filter:blur(70px);
    animation:orbPulse2 7s ease-in-out infinite 2s, orbDrift2 25s ease-in-out infinite}
  @keyframes tetrisFall{0%{top:-92px;opacity:.10}80%{opacity:.08}100%{top:1150px;opacity:0}}
  .tetris{position:fixed;pointer-events:none;z-index:0;opacity:.10;animation:tetrisFall var(--dur,21.6s) linear infinite var(--del,0s)}
  .tetris svg{display:block}
  .wrap{max-width:980px;margin:0 auto;padding:26px 16px;position:relative;z-index:1}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-family:var(--disp);font-size:25px;margin:0;letter-spacing:-.02em;font-weight:700}
  .muted{color:var(--sub);font-size:13px;margin:3px 0 0}
  .logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--amber),var(--rose));display:grid;place-items:center;box-shadow:0 8px 22px rgba(251,77,125,.32),inset 0 0 0 1px rgba(255,255,255,.22)}
  .logo svg{width:28px;height:28px}
  .btn{font-family:var(--disp);background:var(--chip);color:var(--chipt);border:1px solid var(--cb);border-radius:12px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--violet);color:var(--text)}
  .note{font-family:var(--mono);font-size:12px;border-radius:12px;padding:9px 13px;margin:14px 0;line-height:1.5;letter-spacing:.02em}
  .note.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3);color:var(--emerald)}
  .note.warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--amber)}
  .nav{display:flex;gap:8px;margin:22px 0 10px}
  .nav .tab{font-family:var(--disp);padding:9px 18px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .nav .tab.on{background:linear-gradient(135deg,var(--amber),var(--rose));color:#160a12;border-color:transparent;box-shadow:0 6px 18px rgba(251,77,125,.3)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:11px 0}
  .chip{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .chip.on{background:rgba(55,227,212,.14);border-color:rgba(55,227,212,.5);color:var(--text)}
  .controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  input,select{font-family:inherit;background:var(--input);border:1px solid var(--cb);color:var(--text);border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
  select option{background:var(--bg);color:var(--text)}
  input:focus,select:focus{border-color:var(--violet)}
  input{flex:1;min-width:180px}
  .card{position:relative;background:var(--card);border:1px solid var(--cb);border-radius:18px;padding:16px;margin-bottom:13px;display:flex;gap:16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 20px 44px -30px rgba(0,0,0,.9)}
  .card:hover{border-color:rgba(139,125,255,.38)}
  .rank{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--emerald);text-align:center;line-height:1.4}
  .cover{width:64px;height:96px;border-radius:8px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:7px;box-shadow:0 8px 20px rgba(0,0,0,.5)}
  .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cv-cat{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.6)}
  .cv-title{font-size:11px;font-weight:700;color:#fff;line-height:1.1}
  .body{flex:1;min-width:0}
  .title{font-family:var(--disp);font-weight:600;margin:0;font-size:16px}
  .title a{text-decoration:none}
  .title a:hover{color:var(--cyan)}
  .price{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--emerald)}
  .tiny{font-size:11px;color:var(--sub)}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:9px}
  .tag{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--chip);color:var(--chipt);border:1px solid var(--cb)}
  .tag.src{background:rgba(74,222,128,.14);color:var(--emerald);border-color:transparent}
  .actions{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap}
  .link{font-family:var(--disp);background:none;border:none;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;padding:0}
  .link:hover{color:var(--text)}
  .bk{font-family:var(--disp);border:1px solid var(--cb);background:var(--chip);color:var(--chipt);border-radius:999px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer}
  .bk.on{background:rgba(74,222,128,.15);color:var(--emerald);border-color:transparent}
  .bk.rm{color:var(--rose);border-color:rgba(251,77,125,.35)}
  .detail{border-top:1px solid var(--cb);margin-top:12px;padding-top:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
  .shop{border:1px solid var(--cb);border-radius:10px;padding:8px;text-align:center;text-decoration:none;color:var(--text);background:var(--chip)}
  .shop.min{border-color:var(--emerald);background:rgba(74,222,128,.1)}
  .rating{font-family:var(--mono);font-weight:700;font-size:13px;padding:3px 11px;border-radius:8px;line-height:1.5;white-space:nowrap;font-variant-numeric:tabular-nums}
  .rating.r-high{background:rgba(251,77,125,.16);color:#ff8fb0;box-shadow:0 0 0 1px rgba(251,77,125,.32),0 0 18px -7px rgba(251,77,125,.65)}
  .rating.r-mid{background:rgba(55,227,212,.14);color:#7df0e6;box-shadow:0 0 0 1px rgba(55,227,212,.3)}
  .rating.r-low{background:var(--chip);color:var(--sub);border:1px solid var(--cb)}
  .addbox{background:var(--card);border:1px solid var(--cb);border-radius:18px;padding:14px;margin-bottom:16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .addbox input{width:100%}
  .addtabs{display:flex;gap:8px;margin-bottom:10px}
  .atab{font-family:var(--disp);padding:6px 13px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .atab.on{background:linear-gradient(135deg,var(--amber),var(--rose));color:#160a12;border-color:transparent}
  .addmsg{font-family:var(--mono);font-size:12px;color:var(--emerald);margin:0 0 8px}
  .addresults{display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:360px;overflow:auto}
  .rres{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--cb);border-radius:12px;background:var(--chip)}
  .rcover{width:38px;height:54px;border-radius:5px;overflow:hidden;flex:none;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .rcover img{width:100%;height:100%;object-fit:cover}
  .mform{display:flex;flex-direction:column;gap:8px}
  .mrow{display:flex;gap:8px;flex-wrap:wrap}
  .mrow input{min-width:120px}
  .addbtn{font-family:var(--disp);align-self:flex-start;border:1px solid transparent;background:rgba(74,222,128,.15);color:var(--emerald);border-radius:12px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer}
  .addbtn:hover{filter:brightness(1.12)}
  a{color:inherit}
  .empty{text-align:center;color:var(--sub);padding:54px 16px 40px;line-height:1.6}
  .gimg{width:184px;height:86px;border-radius:11px;object-fit:cover;flex:none;background:var(--chip);box-shadow:0 8px 20px rgba(0,0,0,.5)}
  .gprice{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--emerald);margin-top:6px}
  .mposter{width:64px;height:96px;border-radius:8px;object-fit:cover;flex:none;background:var(--chip);box-shadow:0 8px 20px rgba(0,0,0,.5)}
  .mvod{font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(139,125,255,.15);color:var(--violet);border:1px solid rgba(139,125,255,.3)}
  .mvod.kino{background:rgba(251,191,36,.12);color:var(--amber);border-color:rgba(251,191,36,.3)}
  .mtype{font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:999px;font-weight:600}
  .mtype.film{background:rgba(251,77,125,.14);color:var(--rose);border:1px solid rgba(251,77,125,.3)}
  .mtype.serial{background:rgba(55,227,212,.14);color:var(--cyan);border:1px solid rgba(55,227,212,.3)}
  @media(max-width:560px){ .gimg{width:120px;height:56px} .mposter{width:48px;height:72px} }
</style>
</head>

const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const ratingClass = r => r>=80?"r-high":r>=40?"r-mid":"r-low";
const vPrices = b => (b.prices||[]).filter(p=>p&&p.price);
const minPrice = b => {const v=vPrices(b); return v.length?Math.min(...v.map(p=>p.price)):Infinity;};
const inBacklog = t => S.backlog.some(b=>b.title===t);

async function load(){
  S.status="loading"; render();
  try{
    const r = await fetch(DATA_URL + "?t=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json(); const arr = d.books || d;
    if(!Array.isArray(arr) || !arr.length) throw new Error("prázdno");
    S.books = arr; S.updatedAt = d.updatedAt || null; S.status="live";
  }catch(e){ S.books = DEMO; S.status="demo"; }
  render();
}

async function loadGames(){
  S.gamesStatus="loading"; render();
  try{
    const r = await fetch("games.json?t=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json(); const arr = d.games || d;
    if(!Array.isArray(arr)) throw new Error("prázdno");
    S.games = arr; S.gamesUpdatedAt = d.updatedAt || null; S.gamesStatus="live";
  }catch(e){ S.games = GAMES_DEMO; S.gamesStatus="demo"; }
  render();
}
function steamGenres(){
  const c={}; S.games.forEach(g=>(g.tags||[]).forEach(t=>{ if(t) c[t]=(c[t]||0)+1; }));
  return Object.keys(c).sort((a,b)=>c[b]-c[a]);
}
function steamFiltered(){
  const now=Date.now(), win=S.gameWin*864e5;
  return S.games.filter(g=>{
    const d=g.released?Date.parse(g.released):0;
    const inWin=d && (now-d)<=win && d<=now+864e5;
    const inGenre=S.gameGenre==="Vše" || (g.tags||[]).includes(S.gameGenre);
    return inWin && inGenre;
  }).sort((a,b)=>
    S.gameSort==="released" ? (Date.parse(b.released)||0)-(Date.parse(a.released)||0) :
    S.gameSort==="rating"   ? (b.rating||0)-(a.rating||0) :
                              (b.reviews||0)-(a.reviews||0));
}
async function loadMovies(){
  S.moviesStatus="loading"; render();
  try{
    const r = await fetch("movies.json?t=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json(); const arr = d.movies || d;
    if(!Array.isArray(arr)) throw new Error("prázdno");
    S.movies = arr; S.moviesUpdatedAt = d.updatedAt || null; S.moviesStatus="live";
  }catch(e){ S.movies = MOVIES_DEMO; S.moviesStatus="demo"; }
  render();
}
function movieTypes(){
  const c={}; S.movies.forEach(m=>{ if(m.type) c[m.type]=(c[m.type]||0)+1; });
  return Object.keys(c).sort();
}
function movieVodTags(){
  const c={}; S.movies.forEach(m=>(m.vod||[]).forEach(v=>{ if(v) c[v]=(c[v]||0)+1; }));
  return Object.keys(c).sort((a,b)=>c[b]-c[a]);
}
function moviesFiltered(){
  const q=S.movieQ.trim().toLowerCase();
  return S.movies.filter(m=>{
    const inType=S.movieType==="Vše" || m.type===S.movieType;
    const inQ=!q || (m.title||"").toLowerCase().includes(q) || (m.genres||[]).join(" ").toLowerCase().includes(q);
    return inType && inQ;
  }).sort((a,b)=>
    S.movieSort==="rating" ? (b.rating||0)-(a.rating||0) :
    S.movieSort==="year"   ? ((b.year||"")<(a.year||"")?-1:1) : 0);
}
function movieCard(m,i){
  const posterBg = m.poster ? "" : `background:${grad(m.title)}`;
  const posterHtml = m.poster
    ? `<img class="mposter" src="${esc(m.poster)}" alt="" onerror="this.style.visibility='hidden'" />`
    : `<div class="mposter" style="${posterBg};display:flex;flex-direction:column;justify-content:flex-end;padding:6px"><span style="font-size:10px;font-weight:700;color:#fff;line-height:1.1">${esc(m.title)}</span></div>`;
  const rHtml = m.rating!=null
    ? `<span class="rating ${ratingClass(m.rating)}" title="Hodnocení ČSFD">${m.rating} %</span>`
    : `<span class="tag">bez hodnocení</span>`;
  const typeClass = m.type==="film"?"film":"serial";
  const vodHtml = (m.vod||[]).map(v=>`<span class="mvod ${v==='Kino'?'kino':''}">${esc(v)}</span>`).join("");
  const genreHtml = (m.genres||[]).map(g=>`<span class="tag">${esc(g)}</span>`).join("");
  return `<div class="card">
    <div><div class="rank">#${i+1}</div>
      <a href="${esc(m.url)}" target="_blank" rel="noreferrer">${posterHtml}</a></div>
    <div class="body">
      <div class="row"><div style="min-width:0">
        <p class="title"><a href="${esc(m.url)}" target="_blank" rel="noreferrer">${esc(m.title)}</a></p>
        <p class="muted">${esc(m.country||"")}${m.year?" · "+esc(m.year):""}</p>
      </div>
      <div style="text-align:right">${rHtml}</div></div>
      <div class="meta"><span class="mtype ${typeClass}">${esc(m.type)}</span>${vodHtml}${genreHtml}</div>
    </div>
  </div>`;
}

function gimgErr(el){
  try{
    const list=JSON.parse(el.dataset.fb||"[]");
    const i=(+el.dataset.i||0)+1;
    if(i<list.length){ el.dataset.i=String(i); el.src=list[i]; }
    else { el.style.visibility="hidden"; }
  }catch(e){ el.style.visibility="hidden"; }
}
function gameCard(g){
  const rel=g.released?new Date(g.released).toLocaleDateString("cs-CZ"):"";
  const rev=g.reviews?` · ${Number(g.reviews).toLocaleString("cs-CZ")} recenzí`:"";
  const img=g.image||"";
  const swap=h=> img ? img.replace(/^https:\/\/shared\.akamai\.steamstatic\.com/,"https://"+h) : null;
  const cands=[...new Set([
    swap("shared.cloudflare.steamstatic.com"),
    swap("shared.fastly.steamstatic.com"),
    img,
    `https://cdn.cloudflare.steamstatic.com/steam/apps/${g.appid}/header.jpg`
  ].filter(Boolean))];
  const fb=esc(JSON.stringify(cands));
  return `<div class="card">
    <a href="${esc(g.url)}" target="_blank" rel="noreferrer"><img class="gimg" src="${esc(cands[0]||'')}" data-fb='${fb}' data-i="0" onerror="gimgErr(this)" alt="" /></a>
    <div class="body">
      <div class="row"><div style="min-width:0">
        <p class="title"><a href="${esc(g.url)}" target="_blank" rel="noreferrer">${esc(g.name)}</a></p>
        <p class="muted">${esc(rel)}${rev}</p>
      </div>
      <div style="text-align:right;white-space:nowrap">
        <span class="rating ${ratingClass(g.rating)}" title="${esc(g.scoreDesc||'Steam')}">${g.rating} %</span>
        ${g.price?`<div class="gprice">${esc(g.price)}</div>`:""}
      </div></div>
      <div class="meta">${(g.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
    </div>
  </div>`;
}

function filterChips(){
  const c={}; S.books.forEach(b=>(b.cat||[]).forEach(g=>{ if(g) c[g]=(c[g]||0)+1; }));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
function listFiltered(){
  const q = S.q.trim().toLowerCase();
  let r = S.books.filter(b => (!q || (b.title+" "+b.author).toLowerCase().includes(q)) && (S.filter==="Vše" || (b.cat||[]).includes(S.filter)));
  return r.sort((a,b)=>
    S.sort==="readers" ? (b.readers||0)-(a.readers||0) :
    S.sort==="price"   ? minPrice(a)-minPrice(b) :
                         (b.rating??-1)-(a.rating??-1));
}

function coverHtml(b){
  const inner = `<div class="cover" data-pending data-cover="${esc(b.cover||'')}" data-q="${esc((b.title||'')+' '+(b.author||''))}" data-title="${esc(b.title||'')}" style="background:${grad((b.cat||[])[0]||b.title)}">
      <span class="cv-cat">${esc((b.cat||[])[0]||'')}</span><span class="cv-title">${esc(b.title)}</span></div>`;
  return b.link ? `<a href="${esc(b.link)}" target="_blank" rel="noreferrer" title="Otevřít na databazeknih.cz">${inner}</a>` : inner;
}
function titleHtml(b){
  return b.link ? `<a href="${esc(b.link)}" target="_blank" rel="noreferrer">${esc(b.title)}</a>` : esc(b.title);
}
function ratingHtml(b){
  const r = b.rating;
  const badge = r!=null
    ? `<span class="rating ${ratingClass(r)}" title="Hodnocení databazeknih.cz">${r} %</span>`
    : `<span class="tag">bez hodnocení</span>`;
  return `${badge}${(b.cat||[]).map(c=>`<span class="tag">${esc(c)}</span>`).join("")}`;
}
function priceHtml(b){ const vp=vPrices(b); if(!vp.length) return ""; const m=Math.min(...vp.map(p=>p.price)); const s=vp.find(p=>p.price===m);
  return `<div style="text-align:right"><div class="tiny">nejnižší cena</div><div class="price">${m} Kč</div><div class="tiny">${esc(s.shop)}</div></div>`; }
function detailHtml(b){ const vp=vPrices(b).sort((x,y)=>x.price-y.price); const m=vp.length?vp[0].price:null;
  return `<div class="detail"><div class="grid">${vp.map(p=>`<a class="shop ${p.price===m?'min':''}" href="${esc(p.url||'#')}" target="_blank" rel="noreferrer">
    <div class="tiny">${esc(p.shop)}</div><div style="font-weight:700;${p.price===m?'color:var(--emerald)':''}">${p.price} Kč</div>
    ${p.price===m?'<div class="tiny" style="color:var(--emerald)">nejlevnější</div>':''}</a>`).join("")||'<div class="tiny">Ceny se nepodařilo načíst.</div>'}</div></div>`; }

function card(b,i){
  const open = S.expanded===b.title; const bk=inBacklog(b.title);
  return `<div class="card">
    <div><div class="rank">#${i+1}</div>${coverHtml(b)}</div>
    <div class="body">
      <div class="row"><div style="min-width:0"><p class="title">${titleHtml(b)}</p><p class="muted">${esc(b.author)}</p></div>${priceHtml(b)}</div>
      <div class="meta">${ratingHtml(b)}</div>
      <div class="actions">
        <button class="link" data-more="${esc(b.title)}">${open?"Méně ▲":"Detail & ceny ▼"}</button>
        <button class="bk ${bk?'on':''}" data-bk="${esc(b.title)}">${bk?'✓ V backlogu':'+ Backlog'}</button>
      </div>
      ${open?detailHtml(b):""}
    </div>
  </div>`;
}
function backlogCard(b){

      <div class="row"><div style="min-width:0"><p class="title">${titleHtml(b)}</p><p class="muted">${esc(b.author)}</p></div>${priceHtml(b)}</div>
      <div class="meta">${ratingHtml(b)}</div>
      <div class="actions">
        <button class="link" data-more="${esc(b.title)}">${open?"Méně ▲":"Detail & ceny ▼"}</button>
        <button class="bk rm" data-rm="${esc(b.title)}">✕ Odebrat z backlogu</button>

}

function render(){
  document.body.className = S.dark ? "" : "light";
  document.getElementById("theme").textContent = S.dark ? "🌞" : "🌙";

  document.getElementById("nav").innerHTML =
    `<button class="tab ${S.view==='list'?'on':''}" data-view="list">Knižní Bestsellery</button>
     <button class="tab ${S.view==='movies'?'on':''}" data-view="movies">Filmy a Seriály</button>
     <button class="tab ${S.view==='steam'?'on':''}" data-view="steam">Steam</button>
     <button class="tab ${S.view==='backlog'?'on':''}" data-view="backlog">Backlog (${S.backlog.length})</button>`;

  let st="";
  if(S.view==="list"){
    if(S.status==="loading") st='<div class="note warn">Načítám…</div>';
    else if(S.status==="live") st='<div class="note ok">✓ Živá data'+(S.updatedAt?" · aktualizováno "+new Date(S.updatedAt).toLocaleString("cs-CZ"):"")+'</div>';
    else if(S.status==="demo") st='<div class="note warn">Soubor se nepodařilo načíst – ukázková data.</div>';
  }
  document.getElementById("status").innerHTML = st;

  const view = document.getElementById("view");
  if(S.view==="movies"){
    let mst="";
    if(S.moviesStatus==="loading") mst='<div class="note warn">Načítám filmy a seriály…</div>';
    else if(S.moviesStatus==="live") mst='<div class="note ok">✓ ČSFD'+(S.moviesUpdatedAt?" · aktualizováno "+new Date(S.moviesUpdatedAt).toLocaleString("cs-CZ"):"")+'</div>';
    else if(S.moviesStatus==="demo") mst='<div class="note warn">movies.json se nepodařilo načíst – ukázková data.</div>';
    const types=["Vše","film","seriál"].map(t=>`<button class="chip ${S.movieType===t?'on':''}" data-mtype="${esc(t)}">${esc(t==="Vše"?t:t.charAt(0).toUpperCase()+t.slice(1)+"y")}</button>`).join("");
    const msort=`<select id="msort">
        <option value="default"${S.movieSort==='default'?' selected':''}>Dle návštěvnosti</option>
        <option value="rating"${S.movieSort==='rating'?' selected':''}>Dle hodnocení</option>
        <option value="year"${S.movieSort==='year'?' selected':''}>Nejnovější</option>
      </select>`;
    const items=moviesFiltered();
    view.innerHTML = mst
      + `<div class="chips">${types}</div>`
      + `<div class="controls"><input id="mq" placeholder="Hledat film nebo seriál…" value="${esc(S.movieQ)}" />${msort}</div>`
      + (items.length?items.map((m,i)=>movieCard(m,i)).join(""):'<div class="empty">Žádný titul neodpovídá filtru.</div>');
    const mqi=document.getElementById("mq"); if(mqi) mqi.oninput=e=>{S.movieQ=e.target.value; render();};
    const ms=document.getElementById("msort"); if(ms) ms.onchange=e=>{S.movieSort=e.target.value; render();};
  } else if(S.view==="steam"){
    let gst="";
    if(S.gamesStatus==="loading") gst='<div class="note warn">Načítám hry…</div>';
    else if(S.gamesStatus==="live") gst='<div class="note ok">✓ Steam'+(S.gamesUpdatedAt?" · aktualizováno "+new Date(S.gamesUpdatedAt).toLocaleString("cs-CZ"):"")+'</div>';
    else if(S.gamesStatus==="demo") gst='<div class="note warn">games.json se nepodařilo načíst – ukázková data.</div>';
    const wins=[7,14,30].map(w=>`<button class="chip ${S.gameWin===w?'on':''}" data-gwin="${w}">${w} dní</button>`).join("");
    const genres=["Vše",...steamGenres()].map(c=>`<button class="chip ${S.gameGenre===c?'on':''}" data-ggenre="${esc(c)}">${esc(c)}</button>`).join("");
    const items=steamFiltered();
    const gsort=`<div class="controls"><select id="gsort">
        <option value="reviews"${S.gameSort==='reviews'?' selected':''}>Nejvíc recenzí</option>
        <option value="released"${S.gameSort==='released'?' selected':''}>Nejnovější</option>
        <option value="rating"${S.gameSort==='rating'?' selected':''}>Nejvyšší hodnocení</option>
      </select></div>`;
    view.innerHTML = gst
      + `<div class="chips">${wins}</div>`
      + `<div class="chips">${genres}</div>`
      + gsort
      + (items.length?items.map(gameCard).join(""):'<div class="empty">Žádná hra v tomto období a žánru.</div>');
    const gs=document.getElementById("gsort"); if(gs) gs.onchange=e=>{S.gameSort=e.target.value; render();};
  } else if(S.view==="backlog"){
    const list = S.backlog.length
      ? S.backlog.map(b=>backlogCard(b)).join("")
      : '<div class="empty" style="padding:24px 16px">Backlog je prázdný.<br>Přidej knihu níže, nebo u titulů v žebříčku klikni na <b>+ Backlog</b>.</div>';
    view.innerHTML = addPanelHtml() + list;
    mountAddPanel();
  } else {
    const chips = ["Vše",...filterChips()].map(c=>`<button class="chip ${S.filter===c?'on':''}" data-filter="${esc(c)}">${esc(c)}</button>`).join("");
    const items = listFiltered();
    view.innerHTML = `<div class="chips">${chips}</div>
      <div class="controls">
        <input id="q" placeholder="Hledat titul nebo autora…" value="${esc(S.q)}" />
        <select id="sort">
          <option value="readers"${S.sort==='readers'?' selected':''}>Dle prodejní popularity</option>
          <option value="rating"${S.sort==='rating'?' selected':''}>Dle hodnocení</option>

        </select>
      </div>
      ${items.length?items.map((b,i)=>card(b,i)).join(""):'<div class="empty">Žádný titul neodpovídá filtru.</div>'}`;
    const qi=document.getElementById("q"); if(qi){ qi.oninput=e=>{S.q=e.target.value; render(); }; }
    const so=document.getElementById("sort"); if(so) so.onchange=e=>{S.sort=e.target.value; render();};
  }
  hydrateCovers();
}

function tryImg(el, src){ return new Promise(res=>{ const img=document.createElement('img'); img.referrerPolicy='no-referrer';
  img.onload=()=>{ el.appendChild(img); res(true); }; img.onerror=()=>res(false); img.src=src; }); }
async function googleCover(q){ try{
  const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=1&country=CZ`+gbKey());
  const d=await r.json(); const im=d?.items?.[0]?.volumeInfo?.imageLinks;
  const u=(im?.thumbnail||im?.smallThumbnail||"").replace("http://","https://").replace("&edge=curl",""); return u||null;
}catch(e){ return null; } }
let _hydrating=false, _hydrateAgain=false;
async function hydrateCovers(){
  if(_hydrating){ _hydrateAgain=true; return; }
  _hydrating=true; _hydrateAgain=false;
  const els=[...document.querySelectorAll('.cover[data-pending]')];
  for(const el of els){
    el.removeAttribute('data-pending');
    const direct=el.dataset.cover, q=el.dataset.q, t=el.dataset.title;
    if(direct && await tryImg(el,direct)) continue;
    let u=await googleCover(q); if(u && await tryImg(el,u)) continue;
    u=await googleCover(t); if(u) await tryImg(el,u);
  }
  _hydrating=false;
  if(_hydrateAgain) hydrateCovers();
}

function searchPanelHtml(){

      <input id="addq" placeholder="Najdi knihu (název, autor)…" value="${esc(S.addQ)}" autocomplete="off" />
      <button class="addbtn" id="addgo" style="align-self:auto">Hledat</button>

function resultsHtml(){
  if(S.addBusy) return '<div class="tiny" style="padding:8px">Hledám…</div>';
  if(S.addErr) return `<div class="tiny" style="padding:8px;color:#f87171">Vyhledávání selhalo: ${esc(S.addErr)}<br>Nejčastěji blokace googleapis.com (adblock/rozšíření), dočasný limit Google, nebo CSP v náhledu. Zkus jiný prohlížeč/připojení, nebo použij ruční režim.</div>`;
  if(!S.addQ.trim()) return '<div class="tiny" style="padding:8px">Napiš název a stiskni Enter nebo Hledat – obálku, autora i rok doplní Google Books.</div>';
  if(!S.addResults.length) return '<div class="tiny" style="padding:8px">Nic nenalezeno.</div>';
  return S.addResults.map((r,i)=>`<div class="rres">
    <div class="rcover" style="background:${grad(r.title)}">${r.cover?`<img src="${esc(r.cover)}" referrerpolicy="no-referrer" />`:''}</div>
    <div style="flex:1;min-width:0">
      <div class="title" style="font-size:14px">${esc(r.title)}</div>
      <div class="muted">${esc(r.author||'neznámý autor')}${r.year?' · '+esc(r.year):''}</div>
    </div>
    <button class="bk" data-add="${i}">+ Přidat</button>
  </div>`).join("");
}
function manualPanelHtml(){
  const f=S.addForm;
  return `<div class="mform">
    <input id="mf-title" placeholder="Název * (povinné)" value="${esc(f.title)}" autocomplete="off" />
    <input id="mf-author" placeholder="Autor (doporučeno – zpřesní obálku)" value="${esc(f.author)}" autocomplete="off" />
    <input id="mf-cover" placeholder="URL obálky (nepovinné – jinak z Google Books)" value="${esc(f.cover)}" autocomplete="off" />
    <div class="mrow">
      <input id="mf-rating" placeholder="Hodnocení % 0–100 (nepovinné)" value="${esc(f.rating)}" inputmode="numeric" autocomplete="off" />
      <input id="mf-link" placeholder="Odkaz na databazeknih (nepovinné)" value="${esc(f.link)}" autocomplete="off" />
    </div>
    <div class="mrow">
      <input id="mf-shop" placeholder="Obchod" value="${esc(f.shop)}" autocomplete="off" />
      <input id="mf-price" placeholder="Cena Kč" value="${esc(f.price)}" inputmode="numeric" autocomplete="off" />
      <input id="mf-url" placeholder="Odkaz na obchod" value="${esc(f.url)}" autocomplete="off" />
    </div>
    <button class="addbtn" id="mf-submit">Přidat do backlogu</button>
  </div>`;
}
const _gbCache={};
async function gbSearch(q){
  if(_gbCache[q]) return _gbCache[q];
  const u=`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=8`+gbKey();
  let r=await fetch(u+"&country=CZ");
  if(r.status===403) r=await fetch(u);                // některé IP/region: zkus bez country
  if(!r.ok) throw new Error("Google Books HTTP "+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error.message||("kód "+(d.error.code||"?")));
  const out=(d.items||[]).map(it=>{ const v=it.volumeInfo||{}; const im=v.imageLinks||{};
    const cover=(im.thumbnail||im.smallThumbnail||"").replace("http://","https://").replace("&edge=curl","");
    return {title:v.title||"", author:(v.authors||[]).join(", "), cover:cover||null, year:(v.publishedDate||"").slice(0,4)||null};
  }).filter(x=>x.title);
  _gbCache[q]=out; return out;
}
let _searchTimer=null;
function scheduleSearch(){ clearTimeout(_searchTimer); _searchTimer=setTimeout(runSearch,350); }
async function runSearch(){
  clearTimeout(_searchTimer);
  const q=S.addQ.trim();
  if(!q){ S.addResults=[]; S.addErr=""; updateResults(); return; }
  S.addBusy=true; S.addErr=""; updateResults();
  try{ S.addResults=await gbSearch(q); }
  catch(e){ S.addResults=[]; S.addErr=e.message||"chyba sítě"; }
  S.addBusy=false; updateResults();
}
function bindAddButtons(rc){
  rc.querySelectorAll('[data-add]').forEach(btn=>btn.onclick=()=>{
    const r=S.addResults[+btn.dataset.add];
    if(r) addCustomBook({title:r.title, author:r.author||"neznámý autor", cat:["Vlastní"],
      rating:null, ratingSource:null, readers:0, cover:r.cover||null, link:null, prices:[], year:r.year||null, manual:true});
  });
}
function updateResults(){
  const rc=document.getElementById('addresults');
  if(rc){ rc.innerHTML=resultsHtml(); bindAddButtons(rc); }
}
function submitManual(){
  const f=S.addForm; const title=(f.title||"").trim();
  if(!title){ S.addMsg="Vyplň alespoň název."; render(); return; }
  let rating=null; const rn=parseInt((f.rating||"").replace(/[^\d]/g,""),10);
  if(Number.isFinite(rn)) rating=Math.max(0,Math.min(100,rn));
  let prices=[]; const pn=parseInt((f.price||"").replace(/[^\d]/g,""),10);
  if(Number.isFinite(pn)) prices=[{shop:(f.shop||"").trim()||"Obchod", price:pn, url:(f.url||"").trim()||"#"}];
  addCustomBook({title, author:(f.author||"").trim()||"neznámý autor", cat:["Vlastní"],
    rating, ratingSource: rating!=null?"ručně":null, readers:0,
    cover:(f.cover||"").trim()||null, link:(f.link||"").trim()||null, prices, manual:true});
}
function addCustomBook(book){
  if(inBacklog(book.title)){ S.addMsg=book.title+" už v backlogu je."; render(); return; }
  S.backlog.push(book); saveBacklog(S.backlog);
  S.addQ=""; S.addResults=[]; S.addMsg="Přidáno ✓ – "+book.title;
  S.addForm={title:"",author:"",cover:"",rating:"",link:"",shop:"",price:"",url:""};
  render();
}
function mountAddPanel(){
  document.querySelectorAll('.atab').forEach(b=>b.onclick=()=>{S.addMode=b.dataset.amode; S.addMsg=""; render();});
  if(S.addMode==='search'){
    const inp=document.getElementById('addq');
    if(inp){
      inp.oninput=e=>{S.addQ=e.target.value; S.addMsg="";};
      inp.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); runSearch(); } };
    }
    const go=document.getElementById('addgo'); if(go) go.onclick=runSearch;
    const rc=document.getElementById('addresults'); if(rc) bindAddButtons(rc);
  } else {
    const map={title:'mf-title',author:'mf-author',cover:'mf-cover',rating:'mf-rating',link:'mf-link',shop:'mf-shop',price:'mf-price',url:'mf-url'};
    for(const k in map){ const el=document.getElementById(map[k]); if(el) el.oninput=(e=>{S.addForm[k]=e.target.value;}); }
    const sub=document.getElementById('mf-submit'); if(sub) sub.onclick=submitManual;
  }
}

function addBacklog(t){ const b=S.books.find(x=>x.title===t); if(b && !inBacklog(t)){ S.backlog.push(b); saveBacklog(S.backlog); render(); } }
function removeBacklog(t){ S.backlog=S.backlog.filter(x=>x.title!==t); saveBacklog(S.backlog); render(); }
function toggleBacklog(t){ inBacklog(t)?removeBacklog(t):addBacklog(t); }

document.getElementById("refresh").onclick=()=>{ S.view==="steam" ? loadGames() : S.view==="movies" ? loadMovies() : load(); };
document.getElementById("theme").onclick=()=>{S.dark=!S.dark; render();};
document.getElementById("nav").onclick=e=>{const v=e.target.dataset.view; if(v){S.view=v; S.expanded=null;
  if(v==="steam" && S.gamesStatus==="idle"){ loadGames(); }
  else if(v==="movies" && S.moviesStatus==="idle"){ loadMovies(); }
  else { render(); } }};
document.getElementById("view").onclick=e=>{
  const f=e.target.dataset.filter; if(f){S.filter=f; render(); return;}
  const m=e.target.dataset.more; if(m){S.expanded=S.expanded===m?null:m; render(); return;}
  const bk=e.target.dataset.bk; if(bk){toggleBacklog(bk); return;}
  const rm=e.target.dataset.rm; if(rm){removeBacklog(rm); return;}
  const mt=e.target.dataset.mtype; if(mt){S.movieType=mt; render(); return;}
  const gw=e.target.dataset.gwin; if(gw){S.gameWin=+gw; render(); return;}
  const gg=e.target.dataset.ggenre; if(gg){S.gameGenre=gg; render(); return;}
};

load();
</script>
