<style>
  :root{
    --page:#050b16; --win:#4a2028; --winb:#5c2830;
    --bg:#3a1820; --text:#fdeef0; --sub:#c98890;
    --card:#3a1820; --cb:rgba(255,255,255,.08);
    --chip:rgba(255,255,255,.06); --chipt:#e8b0b8; --chipon:#fff; --chipont:#4a2028; --input:rgba(0,0,0,.22);
    --emerald:#7ee787; --amber:#ffd23e; --rose:#ff7a8a; --cyan:#37e3d4; --violet:#c9a0ff;
    --accent:#e8503a;
    --glow:rgba(232,80,58,.18); --glow2:rgba(255,210,62,.10); --grid:rgba(255,255,255,.04);
    --orb1:rgba(232,80,58,.16); --orb2:rgba(255,210,62,.1);
    --disp:"Space Grotesk",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  .light{
    --bg:#eef1fa; --text:#141a2b; --sub:#5d6b8c;
    --card:rgba(255,255,255,.78); --cb:#d6dcf0;
    --chip:#ffffff; --chipt:#3b4258; --chipon:#141a2b; --chipont:#fff; --input:#ffffff;
    --emerald:#16a34a; --amber:#d9810a; --rose:#e11d63; --cyan:#0b8aa0; --violet:#6d5ef0;
    --glow:rgba(109,94,240,.10); --glow2:rgba(11,138,160,.06); --grid:rgba(40,60,120,.05);
    --orb1:rgba(109,94,240,.12); --orb2:rgba(11,138,160,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;min-height:100vh;
    background:var(--page,var(--bg));background-attachment:fixed}
  .light{--page:#eef1fa}
  @keyframes gridScroll{0%{background-position:0 0}100%{background-position:0 46px}}
  @keyframes orbPulse1{0%,100%{opacity:.13;transform:translate(-50%,-50%) scale(1)}50%{opacity:.22;transform:translate(-50%,-50%) scale(1.15)}}
  @keyframes orbPulse2{0%,100%{opacity:.10;transform:translate(-50%,-50%) scale(1.1)}50%{opacity:.18;transform:translate(-50%,-50%) scale(.9)}}
  @keyframes orbDrift1{0%{top:-5%;left:75%}25%{top:10%;left:80%}50%{top:5%;left:70%}75%{top:-2%;left:78%}100%{top:-5%;left:75%}}
  @keyframes orbDrift2{0%{top:8%;left:-2%}25%{top:2%;left:5%}50%{top:12%;left:-5%}75%{top:5%;left:2%}100%{top:8%;left:-2%}}
  body::before{display:none}
  body::after{content:"";position:fixed;pointer-events:none;z-index:0;
    width:500px;height:500px;border-radius:50%;
    top:-5%;left:75%;
    background:var(--orb1,rgba(139,125,255,.18));filter:blur(80px);
    animation:orbPulse1 5s ease-in-out infinite, orbDrift1 20s ease-in-out infinite}
  .orb2{position:fixed;pointer-events:none;z-index:0;
    width:420px;height:420px;border-radius:50%;
    top:8%;left:-2%;
    background:var(--orb2,rgba(55,227,212,.14));filter:blur(70px);
    animation:orbPulse2 7s ease-in-out infinite 2s, orbDrift2 25s ease-in-out infinite}
  @keyframes tetrisFall{0%,14%{opacity:0}16%{opacity:.05}85%{opacity:.04}100%{opacity:0}}
  @keyframes tetrisMove{0%{top:-200px}100%{top:1150px}}
  .tetris{display:none}
  .tetris>svg{display:block}
  .sprite{position:absolute;bottom:100%;image-rendering:pixelated}
  .sprite svg{width:46px;height:46px}
  .wrap{max-width:2200px;margin:0 auto;padding:10px;position:relative;z-index:1;min-height:100vh;box-sizing:border-box}
  @media(min-width:900px){ .wrap{padding:clamp(8px,1vw,20px)} }
  @media(max-width:640px){ .wrap{padding:4px} }
  .launcher{background:var(--win);border-radius:32px;padding:22px;display:flex;gap:18px;align-items:flex-start;box-shadow:0 30px 70px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04)}
  .launcher-main{flex:1;min-width:0}
  .launcher-rail{width:62px;flex:none;background:var(--winb);border-radius:24px;padding:14px 0;display:flex;flex-direction:column;align-items:center;gap:6px;position:sticky;top:20px}
  .rail-btn{position:relative;width:42px;height:42px;border-radius:14px;border:none;background:transparent;color:var(--sub);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,color .2s}
  .rail-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
  .rail-sep{width:28px;height:1px;background:rgba(255,255,255,.1);margin:6px 0}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-family:var(--disp);font-size:25px;margin:0;letter-spacing:-.02em;font-weight:700}
  .muted{color:var(--sub);font-size:13px;margin:3px 0 0}
  .logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--amber),var(--accent));display:grid;place-items:center;box-shadow:0 8px 22px rgba(232,80,58,.35),inset 0 0 0 1px rgba(255,255,255,.22)}
  .logo svg{width:28px;height:28px}
  .btn{font-family:var(--disp);background:var(--chip);color:var(--chipt);border:1px solid var(--cb);border-radius:12px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--accent);color:var(--text)}
  .note{font-family:var(--mono);font-size:12px;border-radius:12px;padding:9px 13px;margin:14px 0;line-height:1.5;letter-spacing:.02em}
  .note.ok{background:rgba(255,255,255,.04);border:1px solid var(--cb);color:var(--sub)}
  .note.warn{background:rgba(255,210,62,.1);border:1px solid rgba(255,210,62,.3);color:var(--amber)}
  .nav{display:flex;flex-direction:column;gap:6px;margin:0}
  .nav .tab{position:relative;font-family:var(--disp);width:42px;height:42px;padding:0;border-radius:14px;font-size:17px;font-weight:600;border:none;background:transparent;color:var(--sub);cursor:pointer;white-space:nowrap;display:flex;align-items:center;justify-content:center}
  .rail-badge{position:absolute;top:-3px;right:-3px;background:var(--amber);color:#4a2028;font-family:var(--mono);font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;box-shadow:0 0 0 2px var(--winb)}
  .rail-dot{position:absolute;bottom:2px;right:2px;width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 2px var(--winb)}
  .rail-dot.ok{background:var(--emerald)} .rail-dot.err{background:var(--rose)} .rail-dot.syncing{background:var(--amber)}
  @media(max-width:780px){
    .launcher{flex-direction:column-reverse}
    .launcher-rail{flex-direction:row;flex-wrap:wrap;width:auto;position:static;border-radius:18px;padding:8px;justify-content:center}
    .launcher-rail .nav{flex-direction:row;flex-wrap:wrap;justify-content:center}
    .launcher-rail .rail-sep{width:1px;height:28px;margin:0 4px}
    .row{flex-wrap:wrap;gap:10px}
  }
  .nav .tab.on{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(232,80,58,.45)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:11px 0}
  .chip{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .chip.on{background:rgba(55,227,212,.14);border-color:rgba(55,227,212,.5);color:var(--text)}
  .controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  input,select{font-family:inherit;background:var(--input);border:1px solid var(--cb);color:var(--text);border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
  select option{background:var(--bg);color:var(--text)}
  input:focus,select:focus{border-color:var(--violet)}
  input{flex:1;min-width:180px}
  .card{position:relative;background:var(--card);border:1px solid var(--cb);border-radius:18px;padding:16px;margin-bottom:13px;display:flex;gap:16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 20px 44px -30px rgba(0,0,0,.9);transition:border-color .2s,transform .2s}
  .card:hover{border-color:rgba(139,125,255,.38);transform:translateY(-1px)}
  .rank{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--emerald);text-align:center;line-height:1.4}
  .cover{width:64px;height:96px;border-radius:8px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:7px;box-shadow:0 8px 20px rgba(0,0,0,.5)}
  .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cv-cat{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.6)}
  .cv-title{font-size:11px;font-weight:700;color:#fff;line-height:1.1}
  .body{flex:1;min-width:0}
  .title{font-family:var(--disp);font-weight:600;margin:0;font-size:16px}
  .title a{text-decoration:none}
  .title a:hover{color:var(--cyan)}
  .price{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--emerald)}
  .tiny{font-size:11px;color:var(--sub)}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:9px}
  .tag{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--chip);color:var(--chipt);border:1px solid var(--cb)}
  .tag.src{background:rgba(74,222,128,.14);color:var(--emerald);border-color:transparent}
  .actions{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap}
  .link{font-family:var(--disp);background:none;border:none;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;padding:0}
  .link:hover{color:var(--text)}
  .bk{font-family:var(--disp);border:1px solid var(--cb);background:var(--chip);color:var(--chipt);border-radius:999px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer}
  .bk.on{background:rgba(74,222,128,.15);color:var(--emerald);border-color:transparent}
  .bk.rm{color:var(--rose);border-color:rgba(251,77,125,.35)}
  .detail{border-top:1px solid var(--cb);margin-top:12px;padding-top:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
  .shop{border:1px solid var(--cb);border-radius:10px;padding:8px;text-align:center;text-decoration:none;color:var(--text);background:var(--chip)}
  .shop.min{border-color:var(--emerald);background:rgba(74,222,128,.1)}
  .rating{font-family:var(--mono);font-weight:700;font-size:13px;padding:3px 11px;border-radius:8px;line-height:1.5;white-space:nowrap;font-variant-numeric:tabular-nums}
  .rating.r-high{background:rgba(251,77,125,.16);color:#ff8fb0;box-shadow:0 0 0 1px rgba(251,77,125,.32),0 0 18px -7px rgba(251,77,125,.65)}
  .rating.r-mid{background:rgba(55,227,212,.14);color:#7df0e6;box-shadow:0 0 0 1px rgba(55,227,212,.3)}
  .rating.r-low{background:var(--chip);color:var(--sub);border:1px solid var(--cb)}
  .addbox{background:var(--card);border:1px solid var(--cb);border-radius:18px;padding:14px;margin-bottom:16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .addbox input{width:100%}
  .addtabs{display:flex;gap:8px;margin-bottom:10px}
  .atab{font-family:var(--disp);padding:6px 13px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .atab.on{background:linear-gradient(135deg,var(--amber),var(--rose));color:#160a12;border-color:transparent}
  .addmsg{font-family:var(--mono);font-size:12px;color:var(--emerald);margin:0 0 8px}
  .addresults{display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:360px;overflow:auto}
  .rres{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--cb);border-radius:12px;background:var(--chip)}
  .rcover{width:38px;height:54px;border-radius:5px;overflow:hidden;flex:none;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .rcover img{width:100%;height:100%;object-fit:cover}
  .mform{display:flex;flex-direction:column;gap:8px}
  .mrow{display:flex;gap:8px;flex-wrap:wrap}
  .mrow input{min-width:120px}
  .addbtn{font-family:var(--disp);align-self:flex-start;border:1px solid transparent;background:rgba(74,222,128,.15);color:var(--emerald);border-radius:12px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer}
  .addbtn:hover{filter:brightness(1.12)}
  a{color:inherit}
  .empty{text-align:center;color:var(--sub);padding:54px 16px 40px;line-height:1.6}
  .gimg{width:184px;height:86px;border-radius:11px;object-fit:cover;flex:none;background:var(--chip);box-shadow:0 8px 20px rgba(0,0,0,.5)}
  .gprice{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--emerald);margin-top:6px}
  .gprice-orig{font-family:var(--mono);font-size:12px;color:var(--sub);text-decoration:line-through;margin-top:4px}
  .gdiscount{font-family:var(--mono);font-size:11px;font-weight:700;color:#0a0a0a;background:var(--emerald);border-radius:4px;padding:1px 5px;margin-left:4px}
  .card.gamepass,.tile.gamepass{border-left:3px solid #107C10}
  .gp-icon{color:#107C10;font-size:13px;margin-right:4px;vertical-align:-1px}
  .hltb-link{font-family:var(--mono);font-size:12px;color:var(--sub);text-decoration:none;white-space:nowrap}
  .hltb-link:hover{color:var(--cyan)}
  .hw-compare{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);white-space:nowrap;cursor:default}
  .hw-dot{width:9px;height:9px;border-radius:50%;flex:none}
  .hw-dot.green{background:var(--emerald)} .hw-dot.orange{background:var(--amber)} .hw-dot.red{background:var(--rose)}
  .mposter{width:64px;height:96px;border-radius:8px;object-fit:cover;flex:none;background:var(--chip);box-shadow:0 8px 20px rgba(0,0,0,.5)}
  .mvod{font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(139,125,255,.15);color:var(--violet);border:1px solid rgba(139,125,255,.3)}
  .mvod.vod-kino{background:rgba(251,191,36,.12);color:#fbbf24;border-color:rgba(251,191,36,.3)}
  .mvod.vod-netflix{background:rgba(229,9,20,.14);color:#e50914;border-color:rgba(229,9,20,.3)}
  .mvod.vod-disney{background:rgba(17,60,207,.14);color:#6ea0ff;border-color:rgba(17,60,207,.3)}
  .mvod.vod-prime{background:rgba(0,168,225,.14);color:#00a8e1;border-color:rgba(0,168,225,.3)}
  .mvod.vod-sledovanitv{background:rgba(227,109,24,.14);color:#e36d18;border-color:rgba(227,109,24,.3)}
  .mvod.vod-hbo,.mvod.vod-max{background:rgba(101,52,183,.14);color:#9b6dff;border-color:rgba(101,52,183,.3)}
  .mvod.vod-apple{background:rgba(168,168,168,.12);color:#a8a8a8;border-color:rgba(168,168,168,.3)}
  .mtype{font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:999px;font-weight:600}
  .mtype.film{background:rgba(251,77,125,.14);color:var(--rose);border:1px solid rgba(251,77,125,.3)}
  .mtype.serial{background:rgba(55,227,212,.14);color:var(--cyan);border:1px solid rgba(55,227,212,.3)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
  .modal{background:var(--bg);border:1px solid var(--cb);border-radius:18px;padding:24px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal h2{font-family:var(--disp);font-size:18px;margin:0 0 12px}
  .modal label{font-size:13px;color:var(--sub);display:block;margin:10px 0 4px}
  .modal input{width:100%;font-family:var(--mono);font-size:13px}
  .modal .mrow{display:flex;gap:8px;margin-top:14px}
  .modal textarea{width:100%;font-family:inherit;font-size:13px;resize:vertical;background:var(--input);border:1px solid var(--cb);border-radius:10px;padding:9px 12px;color:var(--text)}
  .cat-pill{flex:1;background:var(--chip);color:var(--chipt);border:1px solid var(--cb);font-size:12px;padding:8px;border-radius:999px;cursor:pointer;font-weight:600}
  .cat-pill.on{background:linear-gradient(135deg,var(--violet),var(--cyan));color:#0f172a;border-color:transparent}
  .date-pill{background:var(--chip);color:var(--chipt);border:1px solid var(--cb);font-size:12px;padding:7px 12px;border-radius:999px;cursor:pointer}
  .date-pill.on{background:rgba(139,125,255,.16);color:var(--violet);border-color:rgba(139,125,255,.4);font-weight:700}
  .diary-suggest{background:var(--card);border:1px solid var(--cb);border-top:none;border-radius:0 0 10px 10px;margin:0 0 14px;max-height:220px;overflow-y:auto}
  .diary-suggest-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer}
  .diary-suggest-item:hover,.diary-suggest-item.on{background:rgba(139,125,255,.1)}
  .diary-suggest-thumb{width:26px;height:36px;border-radius:4px;flex:none;background-size:cover;background-position:center}
  .diary-layout{display:flex;gap:16px;align-items:flex-start}
  .diary-main{flex:1;min-width:0}
  .diary-month{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--sub);margin:18px 0 6px;letter-spacing:.12em;text-transform:uppercase}
  .diary-month:first-child{margin-top:0}
  .diary-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--cb)}
  .diary-row:last-child{border-bottom:none}
  .diary-date{width:40px;text-align:left;font-size:10px;color:var(--sub);flex:none;font-family:var(--mono)}
  .diary-thumb{width:30px;height:42px;border-radius:5px;flex:none;background-size:cover;background-position:center;box-shadow:0 4px 10px rgba(0,0,0,.4)}
  .diary-note{font-size:12px;color:var(--sub);margin-top:2px;font-style:italic}
  .diary-rm{background:transparent;border:none;color:var(--sub);cursor:pointer;font-size:15px;padding:4px 6px}
  .diary-rm:hover{color:var(--rose)}
  .diary-side{width:150px;flex:none;background:var(--winb);border-radius:16px;padding:16px;text-align:center;position:sticky;top:20px}
  .ds-lbl{font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase}
  .ds-lvl{font-family:var(--disp);font-size:22px;font-weight:800;color:var(--amber);margin:6px 0}
  .ds-bar{height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:6px}
  .ds-bar>div{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--amber))}
  .ds-medals{display:flex;justify-content:center;gap:10px;margin-top:14px}
  .ds-ic{font-size:16px}
  .ds-n{font-family:var(--disp);font-size:14px;font-weight:800;margin-top:2px}
  .ds-total{font-size:10px;color:var(--sub);margin-top:14px;padding-top:12px;border-top:1px solid var(--cb)}
  @media(max-width:640px){ .diary-layout{flex-direction:column} .diary-side{width:100%;position:static} }
  .sync-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:999px;margin-left:6px}
  .sync-badge.ok{background:rgba(74,222,128,.14);color:var(--emerald)}
  .sync-badge.off{background:rgba(251,191,36,.12);color:var(--amber)}
  .sync-badge.err{background:rgba(251,77,125,.14);color:var(--rose)}
  .news-section{margin:18px 0 8px;font-family:var(--disp);font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .news-section .badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(74,222,128,.14);color:var(--emerald)}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:18px}
  .tile{position:relative;background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;flex-direction:column;gap:8px;transition:border-color .2s,transform .2s}
  .tile:hover{border-color:rgba(139,125,255,.38);transform:translateY(-1px)}
  .tile-img{width:100%;aspect-ratio:16/10;border-radius:8px;object-fit:cover;background:var(--chip)}
  .tile-poster{width:56px;height:84px;border-radius:6px;object-fit:cover;flex:none;background:var(--chip)}
  .tile-row{display:flex;gap:10px;align-items:start}
  .tile-title{font-family:var(--disp);font-size:14px;font-weight:600;margin:0;line-height:1.3}
  .tile-title a{text-decoration:none;color:inherit}
  .tile-title a:hover{color:var(--cyan)}
  .tile-sub{font-size:12px;color:var(--sub);margin:0 0 8px}
  .tile-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:auto;padding-top:4px}
  .news-empty{text-align:center;color:var(--sub);padding:40px 16px;line-height:1.6}
  .days-left{position:absolute;top:-10px;right:-10px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:15px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.4);border:2px solid var(--bg);z-index:2}
  .days-left.d3{background:var(--emerald);color:#0a0a0a}
  .days-left.d2{background:var(--amber);color:#0a0a0a}
  .days-left.d1{background:var(--rose);color:#fff}
  button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--violet);outline-offset:2px}
  @media(max-width:560px){ .gimg{width:120px;height:56px} .mposter{width:48px;height:72px} }

  /* ---- GAME HUD layer ---- */
  @keyframes gsweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes gblip{0%,100%{opacity:.35}15%{opacity:1}}
  @keyframes glegGlow{0%,100%{box-shadow:0 0 10px rgba(255,170,40,.4)}50%{box-shadow:0 0 24px rgba(255,170,40,.75)}}
  @keyframes gepicGlow{0%,100%{box-shadow:0 0 8px rgba(163,90,255,.35)}50%{box-shadow:0 0 18px rgba(163,90,255,.65)}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 1px rgba(126,231,135,.3),0 0 10px rgba(126,231,135,.25)}50%{box-shadow:0 0 0 1px rgba(126,231,135,.5),0 0 20px rgba(126,231,135,.55)}}
  @keyframes gxp{from{width:0}}
  @keyframes gfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes gtoast{0%{transform:translateX(120%);opacity:0}10%,90%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
  @keyframes shimmerText{0%{background-position:-200% center}100%{background-position:200% center}}
  .shimmer{background:linear-gradient(90deg,#e8503a,#ffd23e,#7ee787,#e8503a);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmerText 6s linear infinite;font-weight:800}
  .minimap{width:46px;height:46px;border-radius:50%;border:2px solid var(--accent);background:#2a1015;position:relative;overflow:hidden;flex:none;box-shadow:0 8px 22px rgba(232,80,58,.35)}
  .minimap .sweepc{position:absolute;inset:0;background:conic-gradient(from 0deg,rgba(232,80,58,.7),transparent 85deg);animation:gsweep 4s linear infinite}
  .minimap i{position:absolute;width:4px;height:4px;border-radius:50%;animation:gblip 4s infinite}
  .xp-row{display:flex;align-items:center;gap:8px;margin-top:5px}
  .lvl{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--amber);background:rgba(255,210,62,.1);border:1px solid rgba(255,210,62,.4);padding:1px 7px;border-radius:5px;white-space:nowrap}
  .xpbar{width:110px;height:7px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;flex:none}
  .xpbar>div{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--amber));animation:gxp 1.2s cubic-bezier(.2,.8,.2,1) both}
  .xptxt{font-family:var(--mono);font-size:9px;color:var(--sub);white-space:nowrap}
  .card.r-leg,.tile.r-leg{border:2px solid #ffaa28;animation:glegGlow 2.8s ease-in-out infinite}
  .card.r-epic,.tile.r-epic{border:2px solid rgba(163,90,255,.8);animation:gepicGlow 3.2s ease-in-out infinite}
  .card.r-rare,.tile.r-rare{border:2px solid rgba(61,139,255,.65)}
  .rarity{font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:.06em;white-space:nowrap}
  .rarity.leg{background:rgba(255,170,40,.15);color:#ffaa28}
  .rarity.epic{background:rgba(163,90,255,.16);color:#c9a0ff}
  .rarity.rare{background:rgba(61,139,255,.15);color:#6aa5ff}
  .loot-head{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.15em;color:var(--sub);margin:16px 0 10px;text-transform:uppercase}
  .loot-head b{color:#ffaa28}
  .hero-banner{background:linear-gradient(115deg,var(--accent),#c73a52 55%,#7a2838);border-radius:20px;padding:22px 24px;display:flex;gap:18px;align-items:center;margin:14px 0 6px;overflow:hidden}
  .hero-text{flex:1;min-width:0}
  .hero-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .hero-rarity{background:#f8e8a0;color:#7a5510;font-size:11px;font-weight:800;padding:4px 12px;border-radius:999px}
  .hero-pill{background:rgba(0,0,0,.28);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:999px}
  .hero-title{font-family:var(--disp);font-size:clamp(22px,4vw,32px);font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.1}
  .hero-sub{font-size:12px;color:#ffd9d0;margin-top:6px}
  .hero-actions{display:flex;gap:10px;margin-top:14px;align-items:center}
  .hero-btn{background:#caa23c;color:#3a2408;font-family:var(--disp);font-size:13px;font-weight:800;padding:9px 18px;border-radius:999px;border:none;cursor:pointer}
  .hero-link-btn{color:#fff;font-size:12px;font-weight:700;text-decoration:none;opacity:.85}
  .hero-link-btn:hover{opacity:1}
  .hero-img{width:220px;max-width:38%;border-radius:14px;object-fit:cover;box-shadow:0 16px 34px rgba(0,0,0,.4);flex:none}
  @media(max-width:640px){ .hero-banner{flex-direction:column-reverse} .hero-img{width:100%;max-width:100%;height:140px} }
  .bento-strip{display:grid;grid-template-columns:2fr repeat(3,1fr);gap:9px;margin:12px 0 18px}
  @media(max-width:640px){ .bento-strip{grid-template-columns:1fr 1fr} }
  .bento-tile{background:var(--card);border:1px solid var(--cb);border-radius:16px;padding:13px 15px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .bento-tile .num{font-family:var(--disp);font-size:20px;font-weight:800;color:var(--text)}
  .bento-tile .lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .bento-hero .num{font-size:28px}
  .card:hover{border-color:rgba(61,139,255,.5);transform:translateY(-3px) scale(1.004)}
  .tile:hover{border-color:rgba(61,139,255,.5);transform:translateY(-3px) scale(1.01)}
  .gamepass-glow,.hw-dot.green{animation:glowPulse 3s ease-in-out infinite}
  .xp-pill{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(74,222,128,.13);color:var(--emerald);white-space:nowrap}
  .xp-pill-book,.xp-pill-comic{background:rgba(201,160,255,.15);color:#c9a0ff}
  .xp-pill-movie{background:rgba(55,227,212,.13);color:var(--cyan)}
  .xp-pill-game{background:rgba(126,231,135,.13);color:var(--emerald)}
  .qicon{font-size:15px;animation:gfloat 3.4s ease-in-out infinite;display:inline-block}
  .medals{display:flex;gap:10px;margin-bottom:16px}
  .medal{flex:1;text-align:center;border-radius:12px;padding:10px;border:1px solid var(--cb);background:var(--card)}
  .medal .n{font-family:var(--disp);font-size:18px;font-weight:800}
  .medal .l{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.1em}
  .diary-timeline-glow{position:absolute;left:66px;top:2px;bottom:2px;width:2px;background:linear-gradient(180deg,rgba(61,139,255,.45),rgba(74,222,128,.45),rgba(255,210,62,.45))}
  .ach-toast{position:fixed;top:18px;right:18px;z-index:200;background:#131828;border:1px solid rgba(74,222,128,.55);border-radius:12px;padding:11px 14px;display:flex;gap:10px;align-items:center;animation:gtoast 4.5s ease-in-out both;box-shadow:0 12px 30px rgba(0,0,0,.5);max-width:280px}
  @media(prefers-reduced-motion:reduce){ body::before,body::after,.orb2,.tetris{animation:none} .tetris{display:none} .card,.tile{transition:none} .minimap .sweepc,.shimmer,.gamepass-glow,.hw-dot.green,.card.r-leg,.tile.r-leg,.card.r-epic,.tile.r-epic,.qicon{animation:none} }

let mem = null;
const LS_TOKEN = "knizniRadarGHToken";
const REPO_OWNER = "Saceek";
const REPO_NAME = "knizni-radar";
const BACKLOG_PATH = "backlog.json";
const DIARY_PATH = "diary.json";
let _syncStatus = "off";
let _diarySyncStatus = "off";
let _syncError = "";

function getGHToken(){ return localStorage.getItem(LS_TOKEN)||""; }

async function loadRemoteBacklog(){
  const token=getGHToken();
  // With token: read from GitHub API (always fresh, no Pages cache delay)
  if(token){
    try{
      const r=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${BACKLOG_PATH}?t=${Date.now()}`,{cache:"no-store",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github.raw"}});
      if(!r.ok) throw new Error("API "+r.status);
      const d=await r.json();
      return Array.isArray(d)?d:null;
    }catch(e){ console.warn("[sync] API read failed, trying Pages:",e.message); }
  }
  // Fallback: read from GitHub Pages
  try{
    const r=await fetch(BACKLOG_PATH+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) return null;
    const d=await r.json();
    return Array.isArray(d)?d:null;
  }catch(e){ return null; }
}

async function saveRemoteBacklog(data){
  const token=getGHToken();
  if(!token) return false;
  try{
    const apiUrl=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${BACKLOG_PATH}`;
    // Always fetch SHA first - required for updating existing files
    // Step 1: Get SHA
    const getR=await fetch(apiUrl+"?t="+Date.now(),{cache:"no-store",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});
    let sha=null;
    if(getR.ok){
      const f=await getR.json();
      sha=f.sha;
      if(!sha){ _syncError="SHA prázdné - neočekávaná odpověď API"; return false; }
    } else {
      if(getR.status!==404){ _syncError=`Čtení SHA selhalo: ${getR.status}`; return false; }
    }
    // Step 2: Encode content
    const jsonStr=JSON.stringify(data,null,2);
    const bytes=new TextEncoder().encode(jsonStr);
    let binStr=""; for(let i=0;i<bytes.length;i++) binStr+=String.fromCharCode(bytes[i]);
    const content=btoa(binStr);
    // Step 3: PUT
    const body={message:"backlog: sync",content,branch:"main"};
    if(sha) body.sha=sha;
    const r=await fetch(apiUrl,{method:"PUT",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      _syncError=`Zápis selhal: ${r.status} - ${err.message||"neznámá chyba"}`;
      return false;
    }
    return true;
  }catch(e){ _syncError=e.message; console.warn("[sync] save error:",e.message); return false; }
}

async function syncBacklog(){
  _syncStatus="syncing"; render();
  const remote=await loadRemoteBacklog();
  if(remote){
    // Always use remote as source of truth on load
    saveBacklog(remote); S.backlog=remote;
    _syncStatus=getGHToken()?"ok":"off";
  } else {
    // No remote: use local
    S.backlog=loadBacklog();
    _syncStatus=getGHToken()?"ok":"off";
  }
  render();
}

async function saveBacklogAndSync(a){
  saveBacklog(a);
  if(getGHToken()){
    _syncStatus="syncing"; _syncError=""; render();
    const ok=await saveRemoteBacklog(a);
    _syncStatus=ok?"ok":"err";
    render();
  }
}

function loadDiary(){ try{ return JSON.parse(localStorage.getItem(LS_DIARY_KEY))||[]; }catch(e){ return []; } }
function saveDiary(a){ try{ localStorage.setItem(LS_DIARY_KEY, JSON.stringify(a)); }catch(e){} }

async function loadRemoteDiary(){
  const token=getGHToken();
  if(token){
    try{
      const r=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DIARY_PATH}?t=${Date.now()}`,{cache:"no-store",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github.raw"}});
      if(!r.ok) throw new Error("API "+r.status);
      const d=await r.json();
      return Array.isArray(d)?d:null;
    }catch(e){ console.warn("[diary-sync] API read failed, trying Pages:",e.message); }
  }
  try{
    const r=await fetch(DIARY_PATH+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) return null;
    const d=await r.json();
    return Array.isArray(d)?d:null;
  }catch(e){ return null; }
}

async function saveRemoteDiary(data){
  const token=getGHToken();
  if(!token) return false;
  try{
    const apiUrl=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DIARY_PATH}`;
    const getR=await fetch(apiUrl+"?t="+Date.now(),{cache:"no-store",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});
    let sha=null;
    if(getR.ok){ sha=(await getR.json()).sha; }
    else if(getR.status!==404){ return false; }
    const jsonStr=JSON.stringify(data,null,2);
    const bytes=new TextEncoder().encode(jsonStr);
    let binStr=""; for(let i=0;i<bytes.length;i++) binStr+=String.fromCharCode(bytes[i]);
    const content=btoa(binStr);
    const body={message:"diary: sync",content,branch:"main"};
    if(sha) body.sha=sha;
    const r=await fetch(apiUrl,{method:"PUT",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});
    return r.ok;
  }catch(e){ console.warn("[diary-sync] save error:",e.message); return false; }
}

async function syncDiary(){
  _diarySyncStatus="syncing"; render();
  const remote=await loadRemoteDiary();
  if(remote){ saveDiary(remote); S.diary=remote; }
  else { S.diary=loadDiary(); }
  _diarySyncStatus=getGHToken()?"ok":"off";
  render();
}

async function saveDiaryAndSync(a){
  saveDiary(a);
  if(getGHToken()){
    _diarySyncStatus="syncing"; render();
    const ok=await saveRemoteDiary(a);
    _diarySyncStatus=ok?"ok":"err";
    render();
  }
}

const DIARY_MONTHS = ["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
function diaryMonthLabel(dateStr){ const d=new Date(dateStr+"T00:00:00"); return `${DIARY_MONTHS[d.getMonth()]} ${d.getFullYear()}`; }

  </div>`;

  return `<div class="diary-layout"><div class="diary-main">${list}</div>${side}</div>`;

function diarySearchCandidates(cat){
  const q = S.diaryQ.trim().toLowerCase();
  if(!q) return [];
  const out=[];
  const pushIf=(arr,mapFn)=>arr.forEach(x=>{ const t=mapFn(x); if(t && t.title && t.title.toLowerCase().includes(q) && out.length<8) out.push(t); });

    pushIf(S.books,b=>({title:b.title,sub:b.author,image:b.cover,source:"knižní žebříček",url:b.link}));
    pushIf(backlogByCategory("book"),b=>({title:b.title,sub:b.author,image:b.cover,source:"z Backlogu",url:b.link}));
  } else if(cat==="game"){
    pushIf(S.games,g=>({title:g.name,sub:"",image:g.image,source:"Steam",url:g.url}));
    pushIf(backlogByCategory("game"),g=>({title:g.title,sub:"",image:g.image,source:"z Backlogu",url:g.url}));
  } else {
    pushIf(S.movies,m=>({title:m.title,sub:m.year,image:m.poster,source:"ČSFD",url:m.url}));
    pushIf(S.backlog.filter(b=>(b._category||"book")==="movie"),m=>({title:m.title,sub:m.year,image:m.poster,source:"z Backlogu",url:m.url}));
  }
  const seen=new Set(); return out.filter(x=>{ if(seen.has(x.title)) return false; seen.add(x.title); return true; });
}

function mountDiaryModal(div){
  div.querySelectorAll("[data-diarycat]").forEach(b=>b.onclick=()=>{ S.diaryCat=b.dataset.diarycat; S.diarySelected=null; refreshDiaryModal(div); });
  const qi=div.querySelector("#diary-q");
  if(qi){ qi.oninput=e=>{ S.diaryQ=e.target.value; S.diarySelected=null; refreshDiaryModal(div); }; qi.focus(); qi.setSelectionRange(qi.value.length,qi.value.length); }
  div.querySelectorAll("[data-diarypick]").forEach(el=>el.onclick=()=>{
    const title=el.dataset.diarypick;
    const cand=diarySearchCandidates(S.diaryCat).find(c=>c.title===title);
    S.diarySelected=cand||{title}; S.diaryQ=title;
    refreshDiaryModal(div);
  });
  div.querySelectorAll("[data-diarydate]").forEach(b=>b.onclick=()=>{ S.diaryDate=b.dataset.diarydate; refreshDiaryModal(div); });
  const dateInput=div.querySelector("#diary-date-input");
  if(dateInput) dateInput.onchange=e=>{ S.diaryDate=e.target.value; refreshDiaryModal(div); };
  const noteInput=div.querySelector("#diary-note");
  if(noteInput) noteInput.oninput=e=>{ S.diaryNote=e.target.value; };
  const cancel=div.querySelector("#diary-cancel"); if(cancel) cancel.onclick=()=>div.remove();
  const save=div.querySelector("#diary-save");
  if(save) save.onclick=()=>{
    const title=(S.diaryQ||"").trim();
    if(!title){ alert("Zadej název"); return; }
    const sel=S.diarySelected;
    const entry={
      title: sel?.title||title,
      _category:S.diaryCat,
      image: sel?.image||null,
      url: sel?.url||null,
      author: S.diaryCat==="book"?(sel?.sub||null):undefined,
      year: S.diaryCat==="movie"?(sel?.sub||null):undefined,
      date:S.diaryDate,
      note:(S.diaryNote||"").trim()||null,
    };
    S.diary.push(entry);
    saveDiaryAndSync(S.diary);
    div.remove();
    render();
    achToast(entry.title, entryXP(entry));
  };
}

function tryImg(el, src){ return new Promise(res=>{ const img=document.createElement('img'); img.referrerPolicy='no-referrer';
  img.onload=()=>{ el.appendChild(img); res(true); }; img.onerror=()=>res(false); img.src=src; }); }
async function googleCover(q){ try{
  const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=1&country=CZ`+gbKey());
  const d=await r.json(); const im=d?.items?.[0]?.volumeInfo?.imageLinks;
  const u=(im?.thumbnail||im?.smallThumbnail||"").replace("http://","https://").replace("&edge=curl",""); return u||null;
}catch(e){ return null; } }
let _hydrating=false, _hydrateAgain=false;
async function hydrateCovers(){
  if(_hydrating){ _hydrateAgain=true; return; }
  _hydrating=true; _hydrateAgain=false;
  const els=[...document.querySelectorAll('.cover[data-pending]')];
  for(const el of els){
    el.removeAttribute('data-pending');
    const direct=el.dataset.cover, q=el.dataset.q, t=el.dataset.title;
    if(direct && await tryImg(el,direct)) continue;
    let u=await googleCover(q); if(u && await tryImg(el,u)) continue;
    u=await googleCover(t); if(u) await tryImg(el,u);
  }
  _hydrating=false;
  if(_hydrateAgain) hydrateCovers();
}

    const q=encodeURIComponent(rawQ);
    const links = cat==="Hry"||cat==="Vše" ? `<a href="https://store.steampowered.com/search/?term=${q}" target="_blank" rel="noreferrer" style="color:var(--cyan)">Hledat na Steamu →</a>` : "";
    const csfdLink = (cat==="Filmy & Seriály"||cat==="Vše") ? `<a href="https://www.csfd.cz/hledat/?q=${q}" target="_blank" rel="noreferrer" style="color:var(--cyan)">Hledat na ČSFD →</a>` : "";
    const dbkLink = (cat==="Knihy"||cat==="Vše") ? `<a href="https://www.databazeknih.cz/vyhledavani/knihy?q=${q}" target="_blank" rel="noreferrer" style="color:var(--cyan)">Hledat na Databazeknih →</a>` : "";
    const errBanner = S.addErr ? `<div class="tiny" style="color:var(--rose);margin-bottom:8px">⚠ Vyhledávání selhalo: ${esc(S.addErr)}. Zkus to prosím znovu.</div>` : "";
    // ČSFD blokuje živé vyhledávání (anti-bot) - nabídneme přidat holý záznam, který
    // build-enrich-backlog.js při příštím běhu doplní o rok/plakát/hodnocení z ČSFD.
    const bareAddBtn = (cat==="Filmy & Seriály"||cat==="Vše") && rawQ && !inBacklog(rawQ)
      ? `<div style="margin-top:10px"><button class="bk" data-addbare="${esc(rawQ)}">+ Přidat i bez nalezení</button></div>` : "";
    return `<div class="tiny" style="padding:8px">${errBanner}Nic nenalezeno.<br><br>${[csfdLink,dbkLink,links].filter(Boolean).join(" &nbsp; ")}${bareAddBtn}</div>`;
  }
  return S.addResults.map((r,i)=>{
    const cat=r._category||"book";
    const catLabel=cat==="game"?"HRA":cat==="movie"?"FILM":cat==="series"?"SERIÁL":cat==="comic"?"KOMIKS":"KNIHA";
    const img=r.image||r.poster||r.cover;
    const imgHtml=img?`<img src="${esc(img)}" style="width:100%;height:100%;object-fit:cover" />`:"";
    const priceTxt=r.discount?`<span style="text-decoration:line-through">${esc(r.priceOriginal||"")}</span> ${esc(r.price||"")} <span class="gdiscount">-${r.discount}%</span>`:esc(r.price||"");
    const sub=r.author||r.country||"";
    const extLink=cat==="book"?(r.link||`https://www.databazeknih.cz/vyhledavani/knihy?q=${encodeURIComponent(r.title)}`):cat==="movie"||cat==="series"?`https://www.csfd.cz/hledat/?q=${encodeURIComponent(r.title)}`:null;
    const extLinkHtml=extLink?`<a href="${esc(extLink)}" target="_blank" rel="noreferrer" style="font-size:11px;color:var(--cyan)">${cat==="book"?"databazeknih →":"ČSFD →"}</a>`:"";
    return `<div class="rres">
      <div class="rcover" style="background:${grad(r.title)}">${imgHtml}</div>
      <div style="flex:1;min-width:0">
        <div class="title" style="font-size:14px">${cat==="game"&&r.gamePass?gpBadge(r.title):""}${esc(r.title)}</div>
        <div class="muted"><span class="tag" style="font-size:10px;padding:1px 6px">${catLabel}</span> ${sub?esc(sub)+" ":""} ${cat==="game"?priceTxt:""}</div>
        ${extLinkHtml}
      </div>
      <button class="bk ${inBacklog(r.title)?'on':''}" data-add="${i}">${inBacklog(r.title)?'✓ V backlogu':'+ Přidat'}</button>
    </div>`;
  }).join("");
}
async function runSearch(){
  const q=S.addQ.trim();
  const cat=S.addCat||"Vše";
  if(!q){ S.addResults=[]; S.addBusy=false; updateResults(); return; }
  const ql=q.toLowerCase();
  const results=[];
  const searchBooks = cat==="Vše"||cat==="Knihy";
  const searchMovies = cat==="Vše"||cat==="Filmy & Seriály";
  const searchGames = cat==="Vše"||cat==="Hry";
  // Local data
  if(searchBooks)(S.books||[]).forEach(b=>{ if((b.title+" "+b.author).toLowerCase().includes(ql)) results.push({...b,_category:"book"}); });
  if(searchMovies)(S.movies||[]).forEach(m=>{ if((m.title+" "+(m.country||"")).toLowerCase().includes(ql)) results.push({...m,_category:m.type==="seriál"?"series":"movie"}); });
  if(searchGames)(S.games||[]).forEach(g=>{ if(g.name.toLowerCase().includes(ql)) results.push({title:g.name,_category:"game",image:g.image,url:g.url,tags:g.tags,price:g.price,rating:g.rating,gamePass:!!g.gamePass}); });
  S.addResults=results.slice(0,12);
  S.addErr="";
  updateResults();
  S.addBusy=true; updateResults();
  const online=[];
  const errs=[];
  // Steam search
  if(searchGames){
    try{
      const steamTarget=`https://store.steampowered.com/api/storesearch/?term=${encodeURIComponent(q)}&l=czech&cc=cz`;
      const sr=await fetch(`/api/proxy?url=${encodeURIComponent(steamTarget)}`);
      if(sr.ok){
        const sd=await sr.json();
        (sd.items||[]).slice(0,6).forEach(item=>{
          if(results.some(r=>r.title===item.name)||online.some(o=>o.title===item.name)) return;
          let price=item.price?.final!=null?(item.price.final/100).toFixed(2)+"€":null;
          let priceOriginal=item.price?.initial!=null&&item.price.initial!==item.price.final?(item.price.initial/100).toFixed(2)+"€":null;
          let discount=item.price?.initial&&item.price.final&&item.price.initial!==item.price.final?Math.round(100-item.price.final/item.price.initial*100):0;
          if(price==="0.00€"){ price="Zdarma"; priceOriginal=null; discount=0; }
          const img=(item.tiny_image||"").replace("shared.akamai.steamstatic.com","shared.cloudflare.steamstatic.com");
          online.push({title:item.name,_category:"game",image:img,url:`https://store.steampowered.com/app/${item.id}/`,tags:[],price,priceOriginal,discount,rating:item.metascore?+item.metascore:null,gamePass:isInGamePass(item.name)});
        });
      } else { errs.push("Steam: HTTP "+sr.status); }
    }catch(e){ errs.push("Steam vyhledávání selhalo ("+(e.message||"chyba sítě")+")"); }
  }
  // Databazeknih.cz search (primary, Czech books, via vlastní /api/proxy)
  if(searchBooks){
    try{
      const dbkTarget=`https://www.databazeknih.cz/vyhledavani/knihy?q=${encodeURIComponent(q)}`;
      const r=await fetch(`/api/proxy?url=${encodeURIComponent(dbkTarget)}`);
      if(r.ok){
        const html=await r.text();
        // Each entry: <a href="/prehled-knihy/..."><picture>...<img src="COVER" alt="Obálka knihy AUTHOR: TITLE">
        const bookRe=/<a href="(\/prehled-knihy\/[^"]+)">\s*<picture>[\s\S]*?<img src="([^"]+)" alt="Obálka knihy ([^"]+)"/g;
        for(const m of html.matchAll(bookRe)){
          const link='https://www.databazeknih.cz'+m[1];
          const cover=m[2];
          const altText=m[3]; // "Helena Sováková: Plukovnice lidských duší" or just "Titulek"
          let title=altText, author=null;
          if(altText.includes(':')){
            const colonIdx=altText.indexOf(':');
            author=altText.slice(0,colonIdx).trim();
            title=altText.slice(colonIdx+1).trim();
          }
          if(!title||results.some(r=>r.title===title)||online.some(o=>o.title===title)) continue;
          online.push({title,author,cover,_category:"book",link,url:link,cat:["databazeknih.cz"]});
          if(online.filter(o=>o._category==="book").length>=8) break;
        }
      } else { errs.push("Databazeknih: HTTP "+r.status); }
    }catch(e){ errs.push("Databazeknih vyhledávání selhalo ("+(e.message||"chyba sítě")+")"); }
  }
  S.addResults=[...results.slice(0,12),...online].slice(0,15);
  if(errs.length && !S.addResults.length) S.addErr=errs.join(" · ");
  S.addBusy=false;
  updateResults();
}
function bindAddButtons(rc){
  rc.querySelectorAll('[data-add]').forEach(btn=>btn.onclick=()=>{
    const r=S.addResults[+btn.dataset.add];
    if(!r||inBacklog(r.title)) return;
    const item={...r};
    if(!item._category) item._category="book";
    S.backlog.push(item);
    saveBacklogAndSync(S.backlog);
    S.addMsg="Přidáno ✓ – "+r.title;
    render();
  });
  rc.querySelectorAll('[data-addbare]').forEach(btn=>btn.onclick=()=>{
    const title=btn.dataset.addbare;
    if(!title||inBacklog(title)) return;
    S.backlog.push({title, _category:"movie", url:`https://www.csfd.cz/hledat/?q=${encodeURIComponent(title)}`});
    saveBacklogAndSync(S.backlog);
    S.addMsg="Přidáno ✓ – "+title+" (detaily doplní příští aktualizace dat)";
    render();
  });
}
function updateResults(){
  const rc=document.getElementById('addresults');
  if(rc){ rc.innerHTML=resultsHtml(); bindAddButtons(rc); }
}
function mountAddPanel(){
  document.querySelectorAll('[data-addcat]').forEach(b=>b.onclick=()=>{
    S.addCat=b.dataset.addcat; S.addQ=""; S.addResults=[]; S.addMsg=""; render();
  });
  const inp=document.getElementById('addq');
  if(inp){
    inp.oninput=e=>{S.addQ=e.target.value; S.addMsg=""; runSearch();};
    inp.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); runSearch(); } };
  }
  const go=document.getElementById('addgo'); if(go) go.onclick=runSearch;
  const rc=document.getElementById('addresults'); if(rc) bindAddButtons(rc);
}

function addBacklog(t){
  if(inBacklog(t)) return;
  const b=S.books.find(x=>x.title===t);
  if(b){ S.backlog.push({...b,_category:"book"}); saveBacklogAndSync(S.backlog); render(); return; }
  const c=S.comicsBestsellers.find(x=>x.title===t);
  if(c){ S.backlog.push({...c,_category:"comic"}); saveBacklogAndSync(S.backlog); render(); }
}
function addMovieBacklog(t){ const m=S.movies.find(x=>x.title===t); if(m && !inBacklog(t)){ S.backlog.push({...m,_category:"movie"}); saveBacklogAndSync(S.backlog); render(); } }
function addGameBacklog(t){ const g=S.games.find(x=>x.name===t); if(g && !inBacklog(g.name)){ S.backlog.push({title:g.name,_category:"game",appid:g.appid,rating:g.rating,reviews:g.reviews,scoreDesc:g.scoreDesc,image:g.image,url:g.url,tags:g.tags,price:g.price,released:g.released,gamePass:!!g.gamePass}); saveBacklogAndSync(S.backlog); render(); } }
function addComicBacklog(t){ const c=S.comics.find(x=>x.title===t)||S.comicsBestsellers.find(x=>x.title===t); if(c && !inBacklog(t)){ S.backlog.push({...c,_category:"comic"}); saveBacklogAndSync(S.backlog); render(); } }
function removeBacklog(t){ S.backlog=S.backlog.filter(x=>x.title!==t); saveBacklogAndSync(S.backlog); render(); }
function toggleBacklog(t){ inBacklog(t)?removeBacklog(t):addBacklog(t); }
function toggleMovieBacklog(t){ inBacklog(t)?removeBacklog(t):addMovieBacklog(t); }
function toggleGameBacklog(t){ inBacklog(t)?removeBacklog(t):addGameBacklog(t); }
function toggleComicBacklog(t){ inBacklog(t)?removeBacklog(t):addComicBacklog(t); }

document.getElementById("sync-btn").onclick=showSyncSettings;
document.getElementById("diary-btn").onclick=()=>{S.view="diary"; render();};
document.getElementById("theme").onclick=()=>{S.dark=!S.dark; localStorage.setItem("knizniRadarTheme",S.dark?"dark":"light"); render();};
document.getElementById("nav").onclick=e=>{const v=e.target.dataset.view; if(v){S.view=v; S.expanded=null;
  if(v==="steam" && S.gamesStatus==="idle"){ loadGames(); }
  else if(v==="movies" && S.moviesStatus==="idle"){ loadMovies(); }
  else if(v==="news" && S.newsStatus==="idle"){ loadNews(); }
  else if(v==="coming" && S.comingStatus==="idle"){ loadComing(); }
  else if(v==="list"){ if(S.status==="idle") load(); else render(); if(S.comicsStatus==="idle") loadComics(); }
  else { render(); } }};
document.getElementById("view").onclick=e=>{
  const f=e.target.dataset.filter; if(f){S.filter=f; render(); return;}
  const m=e.target.dataset.more; if(m){S.expanded=S.expanded===m?null:m; render(); return;}
  const bk=e.target.dataset.bk; if(bk){toggleBacklog(bk); return;}
  const rm=e.target.dataset.rm; if(rm){removeBacklog(rm); return;}
  const mt=e.target.dataset.mtype; if(mt){S.movieType=mt; render(); return;}
  const mbk=e.target.dataset.mbk; if(mbk){toggleMovieBacklog(mbk); return;}
  const gbk=e.target.dataset.gbk; if(gbk){toggleGameBacklog(gbk); return;}
  const nbk=e.target.dataset.newsbk; if(nbk){ if(!inBacklog(nbk)){ const item=(S.news?.items||[]).find(i=>i.title===nbk); if(item){S.backlog.push(normalizeNewsBook(item)); saveBacklogAndSync(S.backlog); render();}} return;}
  const nmbk=e.target.dataset.newsmbk; if(nmbk){ if(!inBacklog(nmbk)){
    const item=(S.news?.items||[]).find(i=>i.title===nmbk)||(S.coming?.films||[]).find(i=>i.title===nmbk)||(S.coming?.series||[]).find(i=>i.title===nmbk);
    if(item){S.backlog.push(normalizeNewsMovie(item)); saveBacklogAndSync(S.backlog); render();}} return;}
  const ngbk=e.target.dataset.newsgbk; if(ngbk){ if(!inBacklog(ngbk)){
    const item=(S.news?.items||[]).find(i=>i.title===ngbk)||(S.coming?.games||[]).find(i=>i.title===ngbk);
    if(item){S.backlog.push(normalizeNewsGame(item)); saveBacklogAndSync(S.backlog); render();}} return;}
  const cbk=e.target.dataset.cbk; if(cbk){toggleComicBacklog(cbk); return;}
  const ncbk=e.target.dataset.newscbk; if(ncbk){ if(!inBacklog(ncbk)){
    const item=(S.news?.items||[]).find(i=>i.title===ncbk);
    if(item){S.backlog.push({...item,_category:"comic"}); saveBacklogAndSync(S.backlog); render();}} return;}
  const gw=e.target.dataset.gwin; if(gw){S.gameWin=+gw; render(); return;}
  const gg=e.target.dataset.ggenre; if(gg){S.gameGenre=gg; render(); return;}
};

loadNews();
loadGamePass();
loadHLTB();
loadHwCompare();
syncBacklog();
syncDiary();
</script>
