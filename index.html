<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Knižní radar</title>
<style>
  :root{ --bg:#020617; --text:#f1f5f9; --sub:#94a3b8; --card:rgba(15,23,42,.7); --cb:#1e293b;
    --chip:#1e293b; --chipt:#cbd5e1; --chipon:#fff; --chipont:#0f172a; --input:#0f172a; --emerald:#34d399; --amber:#fbbf24; }
  .light{ --bg:#fafaf9; --text:#292524; --sub:#78716c; --card:#fff; --cb:#e7e5e4;
    --chip:#fff; --chipt:#57534e; --chipon:#292524; --chipont:#fff; --input:#fff; --emerald:#059669; --amber:#f59e0b; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:980px;margin:0 auto;padding:24px 16px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-size:24px;margin:0;letter-spacing:-.02em}
  .muted{color:var(--sub);font-size:13px;margin:2px 0 0}
  .logo{background:linear-gradient(135deg,#fbbf24,#f43f5e);border-radius:16px;padding:10px;display:inline-flex}
  .btn{background:var(--chip);color:var(--chipt);border:1px solid var(--cb);border-radius:12px;padding:9px 12px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{opacity:.85}
  .note{font-size:12px;border-radius:12px;padding:8px 12px;margin:16px 0;line-height:1.5}
  .note.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--emerald)}
  .note.warn{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
  .nav{display:flex;gap:8px;margin:16px 0 8px}
  .nav .tab{padding:8px 16px;border-radius:12px;font-size:15px;font-weight:700;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .nav .tab.on{background:var(--chipon);color:var(--chipont);border-color:transparent}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .chip{padding:6px 12px;border-radius:999px;font-size:14px;font-weight:600;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .chip.on{background:var(--chipon);color:var(--chipont);border-color:transparent}
  .controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  input,select{background:var(--input);border:1px solid var(--cb);color:var(--text);border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
  input{flex:1;min-width:180px}
  .card{background:var(--card);border:1px solid var(--cb);border-radius:18px;padding:16px;margin-bottom:12px;display:flex;gap:16px}
  .rank{font-size:12px;font-weight:700;color:var(--sub);text-align:center}
  .cover{width:64px;height:96px;border-radius:6px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:6px;box-shadow:0 4px 10px rgba(0,0,0,.3)}
  .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cv-cat{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.6)}
  .cv-title{font-size:11px;font-weight:700;color:#fff;line-height:1.1}
  .body{flex:1;min-width:0}
  .title{font-weight:600;margin:0}
  .price{font-size:18px;font-weight:700;color:var(--emerald)}
  .tiny{font-size:11px;color:var(--sub)}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
  .tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--chip);color:var(--chipt);border:1px solid var(--cb)}
  .tag.src{background:rgba(16,185,129,.15);color:var(--emerald);border-color:transparent}
  .actions{display:flex;align-items:center;gap:14px;margin-top:8px;flex-wrap:wrap}
  .link{background:none;border:none;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;padding:0}
  .bk{border:1px solid var(--cb);background:var(--chip);color:var(--chipt);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .bk.on{background:rgba(16,185,129,.15);color:var(--emerald);border-color:transparent}
  .bk.rm{color:#f87171}
  .detail{border-top:1px solid var(--cb);margin-top:12px;padding-top:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
  .shop{border:1px solid var(--cb);border-radius:10px;padding:8px;text-align:center;text-decoration:none;color:var(--text)}
  .shop.min{border-color:var(--emerald);background:rgba(16,185,129,.1)}
  .stars{color:var(--amber);letter-spacing:1px}
  a{color:inherit}
  .empty{text-align:center;color:var(--sub);padding:48px 16px}
</style>

<div class="wrap">
  <div class="row">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="logo">📚</span>
      <div><h1>Knižní radar</h1><p class="muted">prodejní bestsellery · hodnocení databazeknih.cz</p></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" id="refresh">⟳ Aktualizovat</button>
      <button class="btn" id="theme">🌞</button>
    </div>
  </div>

  <div class="nav" id="nav"></div>
  <div id="status"></div>
  <div id="view"></div>

  <p class="tiny" style="text-align:center;margin-top:24px">Bestsellery Kosmas / Dobrovský · hodnocení databazeknih.cz · obálky Google Books · backlog uložen v prohlížeči.</p>
</div>

<script>
const DATA_URL = "books.json";
const LS_KEY = "knizniRadarBacklog";
const PALETTE = ["#4f46e5,#312e81","#d97706,#78350f","#0d9488,#134e4a","#e11d48,#881337","#7c3aed,#4c1d95","#0369a1,#0c4a6e","#15803d,#14532d"];
function grad(seed=""){ let h=0; for(const ch of seed) h=(h*31+ch.charCodeAt(0))>>>0; const p=PALETTE[h%PALETTE.length].split(","); return `linear-gradient(135deg,${p[0]},${p[1]})`; }

const DEMO = [
  {title:"Už letím",author:"Martin Moravec, Marek Dvořák",cat:["Dobrovský"],rating:null,ratingSource:null,readers:3,cover:null,prices:[{shop:"Dobrovský",price:384,url:"#"}]},
  {title:"Vona",author:"Petra Klabouchová",cat:["Kosmas"],rating:88,ratingSource:"databazeknih.cz",readers:2,cover:null,prices:[{shop:"Kosmas",price:329,url:"#"}]},
  {title:"O tom Benešovi",author:"Pavel Kosatík",cat:["Kosmas"],rating:78,ratingSource:"databazeknih.cz",readers:1,cover:null,prices:[{shop:"Kosmas",price:539,url:"#"}]},
];

let mem = null;
function loadBacklog(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||[]; }catch(e){ return mem||[]; } }
function saveBacklog(a){ try{ localStorage.setItem(LS_KEY, JSON.stringify(a)); }catch(e){ mem=a; } }

let S = {dark:true, view:"list", filter:"Vše", sort:"readers", q:"", books:DEMO, status:"loading", updatedAt:null, expanded:null, backlog:loadBacklog()};

const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const stars = r => {const v=Math.round((r||0)/100*5); return "★".repeat(v)+"☆".repeat(5-v);};
const vPrices = b => (b.prices||[]).filter(p=>p&&p.price);
const minPrice = b => {const v=vPrices(b); return v.length?Math.min(...v.map(p=>p.price)):Infinity;};
const inBacklog = t => S.backlog.some(b=>b.title===t);

async function load(){
  S.status="loading"; render();
  try{
    const r = await fetch(DATA_URL + "?t=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json(); const arr = d.books || d;
    if(!Array.isArray(arr) || !arr.length) throw new Error("prázdno");
    S.books = arr; S.updatedAt = d.updatedAt || null; S.status="live";
  }catch(e){ S.books = DEMO; S.status="demo"; }
  render();
}

function filterChips(){
  const c={}; S.books.forEach(b=>(b.cat||[]).forEach(g=>{ if(g) c[g]=(c[g]||0)+1; }));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
function listFiltered(){
  const q = S.q.trim().toLowerCase();
  let r = S.books.filter(b => (!q || (b.title+" "+b.author).toLowerCase().includes(q)) && (S.filter==="Vše" || (b.cat||[]).includes(S.filter)));
  return r.sort((a,b)=>
    S.sort==="readers" ? (b.readers||0)-(a.readers||0) :
    S.sort==="price"   ? minPrice(a)-minPrice(b) :
                         (b.rating??-1)-(a.rating??-1));
}

function coverHtml(b){
  return `<div class="cover" data-pending data-cover="${esc(b.cover||'')}" data-q="${esc((b.title||'')+' '+(b.author||''))}" data-title="${esc(b.title||'')}" style="background:${grad((b.cat||[])[0]||b.title)}">
      <span class="cv-cat">${esc((b.cat||[])[0]||'')}</span><span class="cv-title">${esc(b.title)}</span></div>`;
}
function ratingHtml(b){
  return `<span class="stars">${stars(b.rating)}</span><span class="tiny">${b.rating!=null?b.rating+"%":"—"}</span>
    ${b.ratingSource?`<span class="tag src">✓ ${esc(b.ratingSource)}</span>`:`<span class="tag">bez hodnocení</span>`}
    ${(b.cat||[]).map(c=>`<span class="tag">${esc(c)}</span>`).join("")}`;
}
function priceHtml(b){ const vp=vPrices(b); if(!vp.length) return ""; const m=Math.min(...vp.map(p=>p.price)); const s=vp.find(p=>p.price===m);
  return `<div style="text-align:right"><div class="tiny">nejnižší cena</div><div class="price">${m} Kč</div><div class="tiny">${esc(s.shop)}</div></div>`; }
function detailHtml(b){ const vp=vPrices(b).sort((x,y)=>x.price-y.price); const m=vp.length?vp[0].price:null;
  return `<div class="detail"><div class="grid">${vp.map(p=>`<a class="shop ${p.price===m?'min':''}" href="${esc(p.url||'#')}" target="_blank" rel="noreferrer">
    <div class="tiny">${esc(p.shop)}</div><div style="font-weight:700;${p.price===m?'color:var(--emerald)':''}">${p.price} Kč</div>
    ${p.price===m?'<div class="tiny" style="color:var(--emerald)">nejlevnější</div>':''}</a>`).join("")||'<div class="tiny">Ceny se nepodařilo načíst.</div>'}</div></div>`; }

function card(b,i){
  const open = S.expanded===b.title; const bk=inBacklog(b.title);
  return `<div class="card">
    <div><div class="rank">#${i+1}</div>${coverHtml(b)}</div>
    <div class="body">
      <div class="row"><div style="min-width:0"><p class="title">${esc(b.title)}</p><p class="muted">${esc(b.author)}</p></div>${priceHtml(b)}</div>
      <div class="meta">${ratingHtml(b)}</div>
      <div class="actions">
        <button class="link" data-more="${esc(b.title)}">${open?"Méně ▲":"Detail & ceny ▼"}</button>
        <button class="bk ${bk?'on':''}" data-bk="${esc(b.title)}">${bk?'✓ V backlogu':'+ Backlog'}</button>
      </div>
      ${open?detailHtml(b):""}
    </div>
  </div>`;
}
function backlogCard(b){
  const open = S.expanded===b.title;
  return `<div class="card">
    <div>${coverHtml(b)}</div>
    <div class="body">
      <div class="row"><div style="min-width:0"><p class="title">${esc(b.title)}</p><p class="muted">${esc(b.author)}</p></div>${priceHtml(b)}</div>
      <div class="meta">${ratingHtml(b)}</div>
      <div class="actions">
        <button class="link" data-more="${esc(b.title)}">${open?"Méně ▲":"Detail & ceny ▼"}</button>
        <button class="bk rm" data-rm="${esc(b.title)}">✕ Odebrat z backlogu</button>
      </div>
      ${open?detailHtml(b):""}
    </div>
  </div>`;
}

function render(){
  document.body.className = S.dark ? "" : "light";
  document.getElementById("theme").textContent = S.dark ? "🌞" : "🌙";

  document.getElementById("nav").innerHTML =
    `<button class="tab ${S.view==='list'?'on':''}" data-view="list">Bestsellery</button>
     <button class="tab ${S.view==='backlog'?'on':''}" data-view="backlog">Backlog (${S.backlog.length})</button>`;

  let st="";
  if(S.view==="list"){
    if(S.status==="loading") st='<div class="note warn">Načítám…</div>';
    else if(S.status==="live") st='<div class="note ok">✓ Živá data'+(S.updatedAt?" · aktualizováno "+new Date(S.updatedAt).toLocaleString("cs-CZ"):"")+'</div>';
    else if(S.status==="demo") st='<div class="note warn">Soubor se nepodařilo načíst – ukázková data.</div>';
  }
  document.getElementById("status").innerHTML = st;

  const view = document.getElementById("view");
  if(S.view==="backlog"){
    view.innerHTML = S.backlog.length
      ? S.backlog.map(b=>backlogCard(b)).join("")
      : '<div class="empty">Backlog je prázdný.<br>U knih v žebříčku klikni na <b>+ Backlog</b>.</div>';
  } else {
    const chips = ["Vše",...filterChips()].map(c=>`<button class="chip ${S.filter===c?'on':''}" data-filter="${esc(c)}">${esc(c)}</button>`).join("");
    const items = listFiltered();
    view.innerHTML = `<div class="chips">${chips}</div>
      <div class="controls">
        <input id="q" placeholder="Hledat titul nebo autora…" value="${esc(S.q)}" />
        <select id="sort">
          <option value="readers"${S.sort==='readers'?' selected':''}>Dle prodejní popularity</option>
          <option value="rating"${S.sort==='rating'?' selected':''}>Dle hodnocení</option>
          <option value="price"${S.sort==='price'?' selected':''}>Nejnižší cena</option>
        </select>
      </div>
      ${items.length?items.map((b,i)=>card(b,i)).join(""):'<div class="empty">Žádný titul neodpovídá filtru.</div>'}`;
    const qi=document.getElementById("q"); if(qi){ qi.oninput=e=>{S.q=e.target.value; render(); qi2focus(); }; }
    const so=document.getElementById("sort"); if(so) so.onchange=e=>{S.sort=e.target.value; render();};
  }
  hydrateCovers();
}
let _focus=false; function qi2focus(){ const qi=document.getElementById("q"); if(qi){ qi.focus(); qi.setSelectionRange(qi.value.length,qi.value.length);} }

// obálky: data-cover → Google Books(title+autor) → Google Books(title) → stylizovaná záloha; sekvenčně
function tryImg(el, src){ return new Promise(res=>{ const img=document.createElement('img'); img.referrerPolicy='no-referrer';
  img.onload=()=>{ el.appendChild(img); res(true); }; img.onerror=()=>res(false); img.src=src; }); }
async function googleCover(q){ try{
  const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=1&country=CZ`);
  const d=await r.json(); const im=d?.items?.[0]?.volumeInfo?.imageLinks;
  const u=(im?.thumbnail||im?.smallThumbnail||"").replace("http://","https://").replace("&edge=curl",""); return u||null;
}catch(e){ return null; } }
let _hydrating=false;
async function hydrateCovers(){
  if(_hydrating) return; _hydrating=true;
  const els=[...document.querySelectorAll('.cover[data-pending]')];
  for(const el of els){
    el.removeAttribute('data-pending');
    const direct=el.dataset.cover, q=el.dataset.q, t=el.dataset.title;
    if(direct && await tryImg(el,direct)) continue;
    let u=await googleCover(q); if(u && await tryImg(el,u)) continue;
    u=await googleCover(t); if(u) await tryImg(el,u);
  }
  _hydrating=false;
}

function addBacklog(t){ const b=S.books.find(x=>x.title===t); if(b && !inBacklog(t)){ S.backlog.push(b); saveBacklog(S.backlog); render(); } }
function removeBacklog(t){ S.backlog=S.backlog.filter(x=>x.title!==t); saveBacklog(S.backlog); render(); }
function toggleBacklog(t){ inBacklog(t)?removeBacklog(t):addBacklog(t); }

document.getElementById("refresh").onclick=load;
document.getElementById("theme").onclick=()=>{S.dark=!S.dark; render();};
document.getElementById("nav").onclick=e=>{const v=e.target.dataset.view; if(v){S.view=v; S.expanded=null; render();}};
document.getElementById("view").onclick=e=>{
  const f=e.target.dataset.filter; if(f){S.filter=f; render(); return;}
  const m=e.target.dataset.more; if(m){S.expanded=S.expanded===m?null:m; render(); return;}
  const bk=e.target.dataset.bk; if(bk){toggleBacklog(bk); return;}
  const rm=e.target.dataset.rm; if(rm){removeBacklog(rm); return;}
};

load();
</script>
