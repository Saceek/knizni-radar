<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Knižní radar</title>
<style>
  :root{
    --bg:#020617; --text:#f1f5f9; --sub:#94a3b8; --card:rgba(15,23,42,.7); --cb:#1e293b;
    --chip:#1e293b; --chipt:#cbd5e1; --chipon:#fff; --chipont:#0f172a; --input:#0f172a;
    --emerald:#34d399; --amber:#fbbf24;
  }
  .light{
    --bg:#fafaf9; --text:#292524; --sub:#78716c; --card:#fff; --cb:#e7e5e4;
    --chip:#fff; --chipt:#57534e; --chipon:#292524; --chipont:#fff; --input:#fff;
    --emerald:#059669; --amber:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;transition:background .2s}
  .wrap{max-width:980px;margin:0 auto;padding:24px 16px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-size:24px;margin:0;letter-spacing:-.02em}
  .muted{color:var(--sub);font-size:13px;margin:2px 0 0}
  .logo{background:linear-gradient(135deg,#fbbf24,#f43f5e);border-radius:16px;padding:10px;display:inline-flex}
  .btn{background:var(--chip);color:var(--chipt);border:1px solid var(--cb);border-radius:12px;padding:9px 12px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{opacity:.85}
  .note{font-size:12px;border-radius:12px;padding:8px 12px;margin:16px 0;line-height:1.5}
  .note.warn{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
  .note.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--emerald)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
  .chip{padding:6px 12px;border-radius:999px;font-size:14px;font-weight:600;border:1px solid var(--cb);background:var(--chip);color:var(--chipt);cursor:pointer}
  .chip.on{background:var(--chipon);color:var(--chipont);border-color:transparent}
  .controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  input,select{background:var(--input);border:1px solid var(--cb);color:var(--text);border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
  input{flex:1;min-width:180px}
  .card{background:var(--card);border:1px solid var(--cb);border-radius:18px;padding:16px;margin-bottom:12px;display:flex;gap:16px}
  .rank{font-size:12px;font-weight:700;color:var(--sub);text-align:center}
  .cover{width:64px;height:96px;border-radius:6px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:6px;box-shadow:0 4px 10px rgba(0,0,0,.3)}
  .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cv-cat{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.6)}
  .cv-title{font-size:11px;font-weight:700;color:#fff;line-height:1.1}
  .body{flex:1;min-width:0}
  .title{font-weight:600;margin:0}
  .price{font-size:18px;font-weight:700;color:var(--emerald)}
  .tiny{font-size:11px;color:var(--sub)}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
  .tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--chip);color:var(--chipt)}
  .tag.src{background:rgba(16,185,129,.15);color:var(--emerald)}
  .desc{font-size:14px;color:var(--sub);margin:8px 0 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .more{background:none;border:none;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;padding:8px 0 0}
  .detail{border-top:1px solid var(--cb);margin-top:12px;padding-top:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
  .shop{border:1px solid var(--cb);border-radius:10px;padding:8px;text-align:center;text-decoration:none;color:var(--text)}
  .shop.min{border-color:var(--emerald);background:rgba(16,185,129,.1)}
  .stars{color:var(--amber);letter-spacing:1px}
  a{color:inherit}
</style>

<div class="wrap">
  <div class="row">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="logo">📚</span>
      <div><h1>Knižní radar</h1><p class="muted">databazeknih.cz · ceny obchodů</p></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" id="refresh">⟳ Aktualizovat</button>
      <button class="btn" id="theme">🌞</button>
    </div>
  </div>

  <div id="status"></div>
  <div class="chips" id="cats"></div>
  <div class="controls">
    <input id="q" placeholder="Hledat titul nebo autora…" />
    <select id="sort">
      <option value="rating">Dle hodnocení</option>
      <option value="readers">Nejčtenější</option>
      <option value="price">Nejnižší cena</option>
      <option value="year">Novinky (nejnovější)</option>
      <option value="series">Série jako první</option>
    </select>
  </div>
  <div id="list"></div>
  <p class="tiny" style="text-align:center;margin-top:24px">Data z books.json (GitHub Actions, 1×/den) · hodnocení databazeknih.cz · obálky Google Books.</p>
</div>

<script>
const DATA_URL = "books.json"; // stejná doména na GitHub Pages → žádné CORS
const CATS = ["Detektivky","Životopisné","Rozhovory","Čeští autoři"];
const GRAD = {
  "Detektivky":"linear-gradient(135deg,#4f46e5,#312e81)",
  "Životopisné":"linear-gradient(135deg,#d97706,#78350f)",
  "Rozhovory":"linear-gradient(135deg,#0d9488,#134e4a)",
  "Čeští autoři":"linear-gradient(135deg,#e11d48,#881337)"
};
const DEMO = [
  {title:"Hladový hrob",author:"Robert Galbraith (J. K. Rowling)",cat:["Detektivky"],rating:94,ratingSource:"databazeknih.cz",series:"Cormoran Strike (7. díl)",lang:"Čeština",year:2024,pages:944,publisher:"Plus",readers:4820,desc:"Sedmý případ detektiva Strika a Robin Ellacottové.",prices:[{shop:"Palmknihy",price:529,url:"#"},{shop:"Dobrovský",price:539,url:"#"},{shop:"Kosmas",price:559,url:"#"}]},
  {title:"Stíny minulosti",author:"Robert Bryndza",cat:["Detektivky"],rating:92,ratingSource:"databazeknih.cz",series:"Kate Marshallová",lang:"Čeština",year:2025,pages:360,publisher:"Cosmopolis",readers:3540,desc:"Bývalá detektivka znovu otevírá dávno uzavřený případ.",prices:[{shop:"Palmknihy",price:339,url:"#"},{shop:"Kosmas",price:369,url:"#"}]},
  {title:"Noční chodci",author:"Jaroslav Rudiš",cat:["Čeští autoři"],rating:80,ratingSource:"databazeknih.cz",series:null,lang:"Čeština",year:2025,pages:240,publisher:"Labyrint",readers:1980,desc:"Jedna noc, dva kamarádi a pouť pražskými hospodami.",prices:[{shop:"Kosmas",price:134,url:"#"},{shop:"Luxor",price:159,url:"#"}]}
];

let S = {dark:true, cat:"Vše", sort:"rating", q:"", books:DEMO, status:"loading", updatedAt:null, expanded:null};

const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const stars = r => {const v=Math.round((r||0)/100*5); return "★".repeat(v)+"☆".repeat(5-v);};
const validPrices = b => (b.prices||[]).filter(p=>p&&p.price);
const minPrice = b => {const v=validPrices(b); return v.length?Math.min(...v.map(p=>p.price)):Infinity;};

async function load(){
  S.status="loading"; render();
  try{
    const r = await fetch(DATA_URL + "?t=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    const arr = d.books || d;
    if(!Array.isArray(arr) || !arr.length) throw new Error("prázdno");
    S.books = arr; S.updatedAt = d.updatedAt || null; S.status="live";
  }catch(e){ S.books = DEMO; S.status="demo"; }
  render();
}

function listFiltered(){
  const q = S.q.trim().toLowerCase();
  let r = S.books.filter(b => (!q || (b.title+" "+b.author).toLowerCase().includes(q)) && (S.cat==="Vše" || (b.cat||[]).includes(S.cat)));
  return r.sort((a,b)=>
    S.sort==="readers" ? (b.readers||0)-(a.readers||0) :
    S.sort==="price"   ? minPrice(a)-minPrice(b) :
    S.sort==="year"    ? (b.year||0)-(a.year||0) :
    S.sort==="series"  ? ((b.series?1:0)-(a.series?1:0))||((b.rating||0)-(a.rating||0)) :
                         (b.rating??-1)-(a.rating??-1));
}

function render(){
  document.body.className = S.dark ? "" : "light";
  document.getElementById("theme").textContent = S.dark ? "🌞" : "🌙";

  // status
  let st="";
  if(S.status==="loading") st='<div class="note warn">Načítám…</div>';
  else if(S.status==="live") st='<div class="note ok">✓ Živá data'+(S.updatedAt?" · aktualizováno "+new Date(S.updatedAt).toLocaleString("cs-CZ"):"")+'</div>';
  else if(S.status==="demo") st='<div class="note warn">Soubor se nepodařilo načíst (na GitHub Pages bude OK – stejná doména). Zobrazuji ukázková data.</div>';
  document.getElementById("status").innerHTML = st;

  // chips
  document.getElementById("cats").innerHTML = ["Vše",...CATS].map(c=>
    `<button class="chip ${S.cat===c?"on":""}" data-cat="${c}">${c}</button>`).join("");

  // list
  const items = listFiltered();
  document.getElementById("list").innerHTML = items.length ? items.map((b,i)=>card(b,i)).join("")
    : '<p class="muted" style="text-align:center;padding:40px 0">Žádný titul neodpovídá filtru.</p>';
}

function card(b,i){
  const vp = validPrices(b).sort((x,y)=>x.price-y.price);
  const min = vp.length?vp[0].price:null;
  const open = S.expanded===b.title;
  const cover = `<div class="cover" style="background:${GRAD[(b.cat||[])[0]]||"#334155"}">
      <span class="cv-cat">${esc((b.cat||[])[0]||"")}</span>
      <span class="cv-title">${esc(b.title)}</span>
      ${b.cover?`<img src="${esc(b.cover)}" onerror="this.style.display='none'">`:""}
    </div>`;
  return `<div class="card">
    <div><div class="rank">#${i+1}</div>${cover}</div>
    <div class="body">
      <div class="row">
        <div style="min-width:0"><p class="title">${esc(b.title)}</p><p class="muted">${esc(b.author)}</p></div>
        ${min!=null?`<div style="text-align:right"><div class="tiny">nejnižší cena</div><div class="price">${min} Kč</div><div class="tiny">${esc(vp[0].shop)}</div></div>`:""}
      </div>
      <div class="meta">
        <span class="stars">${stars(b.rating)}</span><span class="tiny">${b.rating!=null?b.rating+"%":"—"}</span>
        ${b.ratingSource?`<span class="tag src">✓ ${esc(b.ratingSource)}</span>`:`<span class="tag">bez zdroje</span>`}
        ${b.readers!=null?`<span class="tiny">👥 ${Number(b.readers).toLocaleString("cs-CZ")}</span>`:""}
        ${(b.cat||[]).map(c=>`<span class="tag">${esc(c)}</span>`).join("")}
      </div>
      ${b.desc?`<p class="desc">${esc(b.desc)}</p>`:""}
      <button class="more" data-title="${esc(b.title)}">${open?"Méně ▲":"Detail & ceny ▼"}</button>
      ${open?detail(b,vp,min):""}
    </div>
  </div>`;
}

function detail(b,vp,min){
  const m = [];
  if(b.year) m.push("📅 "+b.year);
  if(b.pages) m.push("📄 "+b.pages+" str.");
  if(b.publisher) m.push("🏢 "+esc(b.publisher));
  if(b.lang) m.push("🌐 "+esc(b.lang));
  if(b.series) m.push("📚 "+esc(b.series));
  const shops = vp.length?`<div class="tiny" style="font-weight:600;margin:10px 0 6px">🛒 Ceny v obchodech</div>
    <div class="grid">${vp.map(p=>`<a class="shop ${p.price===min?"min":""}" href="${esc(p.url||"#")}" target="_blank" rel="noreferrer">
      <div class="tiny">${esc(p.shop)}</div><div style="font-weight:700;${p.price===min?"color:var(--emerald)":""}">${p.price} Kč</div>
      ${p.price===min?'<div class="tiny" style="color:var(--emerald)">nejlevnější</div>':""}</a>`).join("")}</div>`:"";
  return `<div class="detail"><div class="tiny" style="line-height:1.8">${m.join(" &nbsp; ")}</div>${shops}</div>`;
}

document.getElementById("refresh").onclick = load;
document.getElementById("theme").onclick = ()=>{S.dark=!S.dark; render();};
document.getElementById("q").oninput = e=>{S.q=e.target.value; render();};
document.getElementById("sort").onchange = e=>{S.sort=e.target.value; render();};
document.getElementById("cats").onclick = e=>{const c=e.target.dataset.cat; if(c){S.cat=c; render();}};
document.getElementById("list").onclick = e=>{const t=e.target.dataset.title; if(t){S.expanded = S.expanded===t?null:t; render();}};

load();
</script>
